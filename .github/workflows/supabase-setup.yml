name: Supabase setup

# Runs the full database setup (supabase_setup.sql) against the Supabase project
# via the Management API. Token comes from EITHER the SUPABASE_PAT secret OR a
# one-time workflow input (which is masked in logs). Trigger from the Actions tab
# or via the API.

on:
  workflow_dispatch:
    inputs:
      pat:
        description: 'One-time Supabase access token (leave blank to use the SUPABASE_PAT secret). REVOKE it after this run.'
        required: false
        default: ''

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      SUPABASE_PAT: ${{ github.event.inputs.pat != '' && github.event.inputs.pat || secrets.SUPABASE_PAT }}
      PROJECT_REF: kfhieqwailjiqqhdgvez
    steps:
      - uses: actions/checkout@v4

      - name: Mask token in logs
        run: |
          if [ -n "$SUPABASE_PAT" ]; then echo "::add-mask::$SUPABASE_PAT"; fi

      - name: Apply setup SQL
        run: |
          if [ -z "$SUPABASE_PAT" ]; then
            echo "::error::No token. Provide the 'pat' input or set the SUPABASE_PAT secret."
            exit 1
          fi
          BODY=$(jq -Rs '{query: .}' supabase_setup.sql)
          HTTP=$(curl -sS -o resp.json -w "%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/$PROJECT_REF/database/query" \
            -H "Authorization: Bearer $SUPABASE_PAT" \
            -H "Content-Type: application/json" \
            --data "$BODY")
          echo "Setup HTTP status: $HTTP"
          cat resp.json; echo
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "201" ]; then
            echo "::error::Setup failed (HTTP $HTTP)"; exit 1
          fi

      - name: Verify codes + sponsors + tables
        run: |
          q() {
            curl -sS -X POST \
              "https://api.supabase.com/v1/projects/$PROJECT_REF/database/query" \
              -H "Authorization: Bearer $SUPABASE_PAT" \
              -H "Content-Type: application/json" \
              --data "$(jq -Rn --arg q "$1" '{query:$q}')"
            echo
          }
          echo "== Promo codes =="
          q "select code, coins, active from public.promo_codes order by code;"
          echo "== Sponsors =="
          q "select name, paid, served, active from public.sponsors order by id;"
          echo "== Public tables =="
          q "select table_name from information_schema.tables where table_schema='public' order by table_name;"
