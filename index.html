<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>LAX TAPPER</title>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  html,body { margin:0; padding:0; height:100%; background:#05070f; overflow:hidden; font-family:'Courier New',monospace; touch-action:none; }
  #wrap { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
  canvas { image-rendering:pixelated; image-rendering:crisp-edges; background:#000; box-shadow:0 0 0 3px #141a30, 0 0 50px #000; cursor:pointer; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c" width="300" height="540"></canvas></div>
<script>
(function(){
"use strict";

// ====================== SETUP ======================
const W=300, H=540;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;
function resize(){
  const aw=window.innerWidth, ah=window.innerHeight;
  const s=Math.min(aw/W, ah/H);
  canvas.style.width=Math.round(W*s)+'px';
  canvas.style.height=Math.round(H*s)+'px';
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,100));
resize();

// ====================== PALETTE ======================
const C={
  skyTop:'#3a6ea5',skyBot:'#9ed0ee',
  grass1:'#2f9e44',grass2:'#268c3a',grass3:'#1f7a31',
  orange:'#ff8a1e',orangeHi:'#ffb347',orangeDk:'#c75a00',
  mesh:'rgba(255,255,255,0.30)',
  gk:'#e23b4e',gkHi:'#ff6276',gkDk:'#8d1f2c',pad:'#f0f2ff',
  skin:'#ffce9e',jersey:'#15151c',jerseyHi:'#34343f',num:'#ffffff',
  helmet:'#f4f6ff',helmetSh:'#c3c8da',shaft:'#d7d9e0',crosse:'#b9a7d6',
  ball:'#fff7ea',ballSh:'#d9c9a8',
  white:'#ffffff',cream:'#ffe9c2',yellow:'#ffd23f',gold:'#ffb000',
  red:'#ff3b56',green:'#3fe06a',blue:'#43b4ff',grey:'#8b93a7',
  dgrey:'#3a4256',black:'#0a0c12',panel:'#101626',panelHi:'#1d2740',btn:'#243154',btnA:'#3c63b0'
};

// ====================== FONT ======================
const FONT={
 'A':["01110","10001","11111","10001","10001"],'B':["11110","10001","11110","10001","11110"],
 'C':["01111","10000","10000","10000","01111"],'D':["11110","10001","10001","10001","11110"],
 'E':["11111","10000","11110","10000","11111"],'F':["11111","10000","11110","10000","10000"],
 'G':["01111","10000","10011","10001","01111"],'H':["10001","10001","11111","10001","10001"],
 'I':["11111","00100","00100","00100","11111"],'J':["00111","00010","00010","10010","01100"],
 'K':["10001","10010","11100","10010","10001"],'L':["10000","10000","10000","10000","11111"],
 'M':["10001","11011","10101","10001","10001"],'N':["10001","11001","10101","10011","10001"],
 'O':["01110","10001","10001","10001","01110"],'P':["11110","10001","11110","10000","10000"],
 'Q':["01110","10001","10101","10010","01101"],'R':["11110","10001","11110","10010","10001"],
 'S':["01111","10000","01110","00001","11110"],'T':["11111","00100","00100","00100","00100"],
 'U':["10001","10001","10001","10001","01110"],'V':["10001","10001","10001","01010","00100"],
 'W':["10001","10001","10101","11011","10001"],'X':["10001","01010","00100","01010","10001"],
 'Y':["10001","01010","00100","00100","00100"],'Z':["11111","00010","00100","01000","11111"],
 '0':["01110","10011","10101","11001","01110"],'1':["00100","01100","00100","00100","01110"],
 '2':["11110","00001","01110","10000","11111"],'3':["11110","00001","01110","00001","11110"],
 '4':["10010","10010","11111","00010","00010"],'5':["11111","10000","11110","00001","11110"],
 '6':["01111","10000","11110","10001","01110"],'7':["11111","00010","00100","01000","01000"],
 '8':["01110","10001","01110","10001","01110"],'9':["01110","10001","01111","00001","11110"],
 '!':["00100","00100","00100","00000","00100"],'?':["01110","10001","00110","00000","00100"],
 ':':["00000","00100","00000","00100","00000"],'.':["00000","00000","00000","00000","00100"],
 '-':["00000","00000","11111","00000","00000"],'+':["00000","00100","01110","00100","00000"],
 '/':["00001","00010","00100","01000","10000"],'L4':[],
 'LT':["00010","00100","01000","00100","00010"],'GT':["01000","00100","00010","00100","01000"],
 'UP':["00100","01110","10101","00100","00100"],'DN':["00100","00100","10101","01110","00100"],
 ' ':["00000","00000","00000","00000","00000"]
};
function drawText(str,x,y,s,col){ s=s||1; ctx.fillStyle=col||C.white; let cx=x;
  for(const ch of (''+str)){ const g=FONT[ch]||FONT[(''+ch).toUpperCase()]||FONT['?'];
    for(let r=0;r<5;r++){ const row=g[r]; if(!row) continue; for(let i=0;i<5;i++) if(row[i]==='1') ctx.fillRect(cx+i*s,y+r*s,s,s); }
    cx+=6*s; } return cx; }
function textW(str,s){ return (''+str).length*6*s - s; }
function textC(str,y,s,col){ drawText(str,(W-textW(str,s))/2,y,s,col); }
function textS(str,x,y,s,col,sh){ drawText(str,x+s,y+s,s,sh||C.black); drawText(str,x,y,s,col); }
function textCS(str,y,s,col,sh){ textS(str,(W-textW(str,s))/2,y,s,col,sh); }
// glyph helpers for arrow icons (size in px)
function glyph(name,x,y,s,col){ ctx.fillStyle=col||C.white; const g=FONT[name]; for(let r=0;r<5;r++)for(let i=0;i<5;i++) if(g[r][i]==='1') ctx.fillRect(x+i*s,y+r*s,s,s); }

// ====================== INPUT ======================
let pressQueue=[];
let pointers={};
let keys={moveL:false,moveR:false,moveU:false,moveD:false,aimL:false,aimR:false,aimU:false,aimD:false};
let spaceDown=false;
// twin virtual joysticks (bottom corners)
const LJOY={cx:64,cy:470,r:48,k:24};
const RJOY={cx:W-64,cy:470,r:48,k:24};
let sL={id:null,dx:0,dy:0};
let sR={id:null,dx:0,dy:0};
let rReleased=false;           // edge flag: right stick was just let go
function inJoy(j,x,y){ return Math.hypot(x-j.cx,y-j.cy)<=j.r+28; }
function setJoy(j,s,x,y){ s.dx=clamp((x-j.cx)/j.r,-1,1); s.dy=clamp((y-j.cy)/j.r,-1,1); }
function resetSticks(){ sL.id=null; sL.dx=0; sL.dy=0; sR.id=null; sR.dx=0; sR.dy=0; rReleased=false; }
function pt(clientX,clientY){ const r=canvas.getBoundingClientRect(); return {x:(clientX-r.left)/(r.width/W), y:(clientY-r.top)/(r.height/H)}; }
function down(id,x,y){
  unlockAudio(); pointers[id]={x,y}; pressQueue.push({x,y});
  if(sL.id===null && inJoy(LJOY,x,y)){ sL.id=id; setJoy(LJOY,sL,x,y); }
  else if(sR.id===null && inJoy(RJOY,x,y)){ sR.id=id; setJoy(RJOY,sR,x,y); }
}
function move(id,x,y){
  if(pointers[id]) pointers[id]={x,y};
  if(id===sL.id) setJoy(LJOY,sL,x,y);
  if(id===sR.id) setJoy(RJOY,sR,x,y);
}
function up(id){
  delete pointers[id];
  if(id===sL.id){ sL.id=null; sL.dx=0; sL.dy=0; }
  if(id===sR.id){ sR.id=null; rReleased=true; }   // keep dx,dy so the game can shoot where it pointed
}
canvas.addEventListener('mousedown',e=>{ e.preventDefault(); const p=pt(e.clientX,e.clientY); down('m',p.x,p.y); });
window.addEventListener('mousemove',e=>{ if(pointers['m']){ const p=pt(e.clientX,e.clientY); move('m',p.x,p.y); } });
window.addEventListener('mouseup',()=>up('m'));
canvas.addEventListener('touchstart',e=>{ e.preventDefault(); for(const t of e.changedTouches){ const p=pt(t.clientX,t.clientY); down(t.identifier,p.x,p.y); } },{passive:false});
canvas.addEventListener('touchmove',e=>{ e.preventDefault(); for(const t of e.changedTouches){ const p=pt(t.clientX,t.clientY); move(t.identifier,p.x,p.y); } },{passive:false});
canvas.addEventListener('touchend',e=>{ e.preventDefault(); for(const t of e.changedTouches) up(t.identifier); },{passive:false});
canvas.addEventListener('touchcancel',e=>{ for(const t of e.changedTouches) up(t.identifier); });
canvas.addEventListener('dblclick',e=>e.preventDefault());
canvas.addEventListener('gesturestart',e=>e.preventDefault());
window.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='Enter'){ e.preventDefault(); if(!spaceDown){ pressQueue.push({x:-1,y:-1}); spaceDown=true; } }
  if(e.code==='KeyA') keys.moveL=true; if(e.code==='KeyD') keys.moveR=true;
  if(e.code==='KeyW') keys.moveU=true; if(e.code==='KeyS') keys.moveD=true;
  if(e.code==='ArrowLeft') keys.aimL=true; if(e.code==='ArrowRight') keys.aimR=true;
  if(e.code==='ArrowUp') keys.aimU=true; if(e.code==='ArrowDown') keys.aimD=true;
});
window.addEventListener('keyup',e=>{
  if(e.code==='Space'||e.code==='Enter') spaceDown=false;
  if(e.code==='KeyA') keys.moveL=false; if(e.code==='KeyD') keys.moveR=false;
  if(e.code==='KeyW') keys.moveU=false; if(e.code==='KeyS') keys.moveD=false;
  if(e.code==='ArrowLeft') keys.aimL=false; if(e.code==='ArrowRight') keys.aimR=false;
  if(e.code==='ArrowUp') keys.aimU=false; if(e.code==='ArrowDown') keys.aimD=false;
});
function consumeTap(){ return pressQueue.length?pressQueue.shift():null; }
function hit(p,r){ return p && p.x>=r.x && p.x<=r.x+r.w && p.y>=r.y && p.y<=r.y+r.h; }
function held(r){ for(const id in pointers){ const q=pointers[id]; if(q.x>=r.x&&q.x<=r.x+r.w&&q.y>=r.y&&q.y<=r.y+r.h) return true; } return false; }

// ====================== SOUND ======================
let actx=null;
function ac(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return actx; }
function unlockAudio(){ const a=ac(); if(a&&a.state==='suspended') a.resume(); }
function beep(f,d,t,v){ const a=ac(); if(!a) return; try{ const o=a.createOscillator(),g=a.createGain();
  o.type=t||'square'; o.frequency.value=f; g.gain.value=v||0.05; o.connect(g); g.connect(a.destination);
  const n=a.currentTime; o.start(n); g.gain.setValueAtTime(g.gain.value,n); g.gain.exponentialRampToValueAtTime(0.0001,n+(d||0.1)); o.stop(n+(d||0.1)); }catch(e){} }
function foulSound(){ const a=ac(); if(!a) return; try{
  // classic sad-trombone "wah wah wah waaaah" - brassy sawtooth notes that each bend down
  const notes=[[392,370,0.22],[349,330,0.22],[311,294,0.24],[262,180,0.75]];
  let t=a.currentTime;
  for(const [f0,f1,d] of notes){ const o=a.createOscillator(), g=a.createGain();
    o.type='sawtooth'; o.connect(g); g.connect(a.destination);
    o.frequency.setValueAtTime(f0,t); o.frequency.linearRampToValueAtTime(f1,t+d);
    g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(0.075,t+0.03); g.gain.exponentialRampToValueAtTime(0.0001,t+d);
    o.start(t); o.stop(t+d+0.03); t+=d*0.9; }
}catch(e){} }
const SFX={
  shoot:()=>{ beep(720,0.06,'square',0.05); setTimeout(()=>beep(420,0.05),40); },
  foul:()=>foulSound(),
  goal:()=>{ beep(523,0.08); setTimeout(()=>beep(659,0.08),80); setTimeout(()=>beep(880,0.16),160); },
  save:()=>beep(120,0.22,'sawtooth',0.06),
  wide:()=>beep(180,0.16,'sine',0.05),
  big:()=>{ beep(660,0.07); setTimeout(()=>beep(880,0.07),70); setTimeout(()=>beep(1175,0.16),140); },
  ui:()=>beep(840,0.05,'square',0.05),
  start:()=>{ beep(523,0.07); setTimeout(()=>beep(784,0.12),80); }
};

// ====================== HELPERS ======================
function rnd(a,b){ return a+Math.random()*(b-a); }
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function lerp(a,b,t){ return a+(b-a)*t; }
function dist(ax,ay,bx,by){ return Math.hypot(ax-bx,ay-by); }
function vgrad(x,y,w,h,c1,c2){ const g=ctx.createLinearGradient(x,y,x,y+h); g.addColorStop(0,c1); g.addColorStop(1,c2); ctx.fillStyle=g; ctx.fillRect(x,y,w,h); }
const HI={g1:0};
try{ HI.g1=+localStorage.getItem('lax4_hi1')||0; }catch(e){}
function saveHi(){ try{ localStorage.setItem('lax4_hi1',HI.g1); }catch(e){} }
// leaderboard (top 10, stored on this device)
let LB=[];
try{ LB=JSON.parse(localStorage.getItem('lax4_lb')||'[]')||[]; if(!Array.isArray(LB)) LB=[]; }catch(e){ LB=[]; }
function lbSave(){ try{ localStorage.setItem('lax4_lb',JSON.stringify(LB)); }catch(e){} }
function lbQualifies(s){ return s>0 && (LB.length<10 || s>LB[LB.length-1].s); }
function lbInsert(n,s){ LB.push({n:n,s:s}); LB.sort((a,b)=>b.s-a.s); LB=LB.slice(0,10); lbSave(); return LB.indexOf(LB.find(e=>e.n===n&&e.s===s)); }
// ---- global leaderboard (Supabase) ----
const SUPA_URL='https://xmmhaylumsdktljmxjgv.supabase.co';
const SUPA_KEY='sb_publishable_MkMrj9PwzdNqUIua69e7Gg_F1uydGSt';
const SUPA_HEAD={apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY};
let lbStatus='local';   // local | loading | global | offline
function lbFetch(){
  if(typeof fetch!=='function') return;
  lbStatus='loading';
  fetch(SUPA_URL+'/rest/v1/scores?select=name,score&order=score.desc&limit=10',{headers:SUPA_HEAD})
    .then(r=>r.ok?r.json():Promise.reject(r.status))
    .then(rows=>{ if(Array.isArray(rows)){ LB=rows.map(r=>({n:(''+r.name).slice(0,3).toUpperCase(),s:r.score|0})); lbSave(); lbStatus='global'; } })
    .catch(()=>{ lbStatus='offline'; });
}
function lbSubmit(name,score){
  if(typeof fetch!=='function') return;
  fetch(SUPA_URL+'/rest/v1/scores',{method:'POST',headers:Object.assign({'Content-Type':'application/json',Prefer:'return=minimal'},SUPA_HEAD),body:JSON.stringify({name:name,score:score})})
    .then(r=>{ if(r.ok) lbFetch(); else lbStatus='offline'; })
    .catch(()=>{ lbStatus='offline'; });
}
lbFetch();   // prime the world board on load
// career stats + badges
let STATS={games:0,goals:0,bestCombo:0,fiveHoles:0,topCorners:0,perfects:0};
try{ STATS=Object.assign(STATS, JSON.parse(localStorage.getItem('lax4_stats')||'{}')||{}); }catch(e){}
function statsSave(){ try{ localStorage.setItem('lax4_stats',JSON.stringify(STATS)); }catch(e){} }
// ---- player profile: appearance, coins, upgrades ----
const PALETTE=['#e23b3b','#ff8c1a','#ffd23f','#37c66b','#1f9be0','#7a5cff','#ff5ca8','#ffffff','#0e1322','#1f2633','#9aa3b2','#7a5a2b'];
let PROFILE={num:15,jersey:'#e23b3b',numCol:'#ffffff',helmet:'#0e1322',pants:'#1f2633',shaft:'#7a5a2b',head:'#ff8c1a',coins:0,stickLv:0,trainLv:0};
try{ PROFILE=Object.assign(PROFILE, JSON.parse(localStorage.getItem('lax4_profile')||'{}')||{}); }catch(e){}
function profSave(){ try{ localStorage.setItem('lax4_profile',JSON.stringify(PROFILE)); }catch(e){} }
function shade(hex,p){ const n=parseInt((hex||'#000').slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=clamp(Math.round(r+255*p),0,255); g=clamp(Math.round(g+255*p),0,255); b=clamp(Math.round(b+255*p),0,255); return 'rgb('+r+','+g+','+b+')'; }
const UP_MAX=10;                          // max level per track
const stickSpd=()=>9.5*(1+0.03*PROFILE.stickLv);          // +3% shot speed / level
const trainMul=()=>1+0.04*PROFILE.trainLv;                // +4% move & aim speed / level
function upCost(lv){ return 20*(lv+1); }                  // 20,40,60... coins
let ACH_DONE={};
try{ ACH_DONE=JSON.parse(localStorage.getItem('lax4_ach')||'{}')||{}; }catch(e){ ACH_DONE={}; }
function achSave(){ try{ localStorage.setItem('lax4_ach',JSON.stringify(ACH_DONE)); }catch(e){} }
const ACH=[
  {id:'first',  n:'FIRST BLOOD', d:'SCORE YOUR FIRST GOAL'},
  {id:'snipe',  n:'SNIPER',      d:'SCORE A TOP CORNER'},
  {id:'five',   n:'5 HOLE HERO', d:'SCORE THROUGH THE LEGS'},
  {id:'hat',    n:'HAT TRICK',   d:'3 GOALS IN ONE GAME'},
  {id:'combo3', n:'ON FIRE',     d:'3 GOALS IN A ROW'},
  {id:'combo5', n:'UNCONSCIOUS', d:'5 GOALS IN A ROW'},
  {id:'sharp',  n:'SHARPSHOOTER',d:'7+ GOALS IN A GAME'},
  {id:'perfect',n:'PERFECT TEN', d:'SCORE ALL 10 SHOTS'},
  {id:'s25',    n:'GOAL GETTER', d:'25+ POINTS IN A GAME'},
  {id:'s35',    n:'DEADEYE',     d:'35+ POINTS IN A GAME'},
  {id:'vet',    n:'VETERAN',     d:'PLAY 10 GAMES'},
  {id:'cent',   n:'CENTURION',   d:'100 CAREER GOALS'}
];
function medalFor(s){ return s>=40?{n:'PLATINUM',c:'#9fe6ff'}:s>=30?{n:'GOLD',c:'#ffd23f'}:s>=20?{n:'SILVER',c:'#d6dcea'}:s>=10?{n:'BRONZE',c:'#d9974f'}:null; }
let parts=[];
function spawn(x,y,n,cols,sp){ sp=sp||2.6; for(let i=0;i<n;i++) parts.push({x,y,vx:rnd(-sp,sp),vy:rnd(-sp*1.3,-0.3),life:rnd(24,46),c:cols[(Math.random()*cols.length)|0]}); }
function updateParts(){ for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.14; p.life--; if(p.life<=0) parts.splice(i,1); } }
function drawParts(){ for(const p of parts){ ctx.fillStyle=p.c; const s=p.life>14?2:1; ctx.fillRect(p.x|0,p.y|0,s+1,s+1); } }

// ====================== SPRITES ======================
function drawBall(x,y,r){ r=r||4;
  ctx.fillStyle=C.ballSh; ctx.beginPath(); ctx.arc(x,y+1,r,0,7); ctx.fill();
  ctx.fillStyle=C.ball; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.fillRect(x-r+1,y-r+1,2,2);
}
function drawShooter(x,y,wind){
  const P=PROFILE;
  ctx.fillStyle=P.pants; ctx.fillRect(x-6,y,5,14); ctx.fillRect(x+2,y,5,14);
  ctx.fillStyle=C.black; ctx.fillRect(x-7,y+13,7,3); ctx.fillRect(x+1,y+13,7,3);
  ctx.fillStyle=P.jersey; ctx.fillRect(x-9,y-16,18,18);
  ctx.fillStyle=shade(P.jersey,0.18); ctx.fillRect(x-9,y-16,18,3);
  const ns=''+P.num; drawText(ns,x-textW(ns,1)/2,y-11,1,P.numCol);
  ctx.fillStyle=C.skin; ctx.fillRect(x-4,y-25,8,9);
  ctx.fillStyle=P.helmet; ctx.fillRect(x-6,y-27,12,8);
  ctx.fillStyle=shade(P.helmet,-0.22); ctx.fillRect(x-6,y-21,12,2);
  ctx.fillStyle=C.dgrey; ctx.fillRect(x+3,y-22,3,4);
  const sw=wind?4:0;
  ctx.strokeStyle=C.skin; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(x+6,y-12); ctx.lineTo(x+13+sw,y-20); ctx.stroke();
  ctx.strokeStyle=P.shaft; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(x+13+sw,y-20); ctx.lineTo(x+24+sw,y-42); ctx.stroke();
  ctx.fillStyle=P.head; ctx.fillRect(x+22+sw,y-50,8,8); ctx.fillStyle=shade(P.head,-0.25); ctx.fillRect(x+23+sw,y-49,6,6);
}
function drawRef(t){
  const ease=1-Math.pow(1-clamp(t/40,0,1),2), rx=lerp(W+30,208,ease), ry=258, run=Math.sin(t*0.5)*3;
  ctx.fillStyle='#15171c'; ctx.fillRect(rx-4,ry,3,10+run); ctx.fillRect(rx+1,ry,3,10-run);     // legs
  ctx.fillStyle='#0a0a0c'; ctx.fillRect(rx-5,ry+9+run,5,3); ctx.fillRect(rx+1,ry+9-run,5,3);    // shoes
  for(let i=0;i<5;i++){ ctx.fillStyle=i%2?'#1a1a1e':'#e8eaf0'; ctx.fillRect(rx-6+i*2.4,ry-13,2.4,14); } // striped shirt
  ctx.strokeStyle=C.skin; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(rx-5,ry-9); ctx.lineTo(rx-11,ry-16-Math.max(0,9-t*0.4)); ctx.stroke(); // raised arm
  ctx.fillStyle=C.skin; ctx.fillRect(rx-3,ry-21,7,7);                                            // head
  ctx.fillStyle='#0a0a0c'; ctx.fillRect(rx-5,ry-24,10,4); ctx.fillRect(rx-9,ry-21,5,2);          // cap + brim
  if(t>=16){ const ft=t-16, p=clamp(ft/46,0,1), fx=lerp(rx-10,150,p), fy=242-Math.sin(p*Math.PI)*80;
    ctx.save(); ctx.translate(fx,fy); ctx.rotate(ft*0.5);
    ctx.strokeStyle='#b9933f'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,-7); ctx.lineTo(0,7); ctx.stroke();

function drawGoalie(x,baseY,bw,bh,lunge,fh,fhOpen){

// ====================== GAME — GOALIE (twin-stick) ======================
const G1={};
const NET1={x:60,y:64,w:180,h:150};
const AIM_CX=NET1.x+NET1.w/2, AIM_CY=NET1.y+NET1.h/2;
const AIM_EX=NET1.w/2+22, AIM_EY=NET1.h/2+20;   // reaches past the posts so you can miss
const AIM_MINX=NET1.x-26, AIM_MAXX=NET1.x+NET1.w+26;
const AIM_MINY=NET1.y-26, AIM_MAXY=NET1.y+NET1.h+30;
const FH_OPEN=80, FH_SHUT=170;                  // five hole: ~1.3s open, ~2.8s shut
const SHOT_CLOCK=300;                           // 5 seconds at 60fps to get the shot off
// the attacker roams the field; the CREASE (half-circle at the goal mouth) is off-limits
const SH_MINX=38, SH_MAXX=W-38, SH_MINY=232, SH_MAXY=424;
const CREASE={cx:AIM_CX, cy:NET1.y+NET1.h, r:74};
function inCrease(x,y){ return (y-CREASE.cy)>0 && dist(x,y,CREASE.cx,CREASE.cy)<CREASE.r; }
function g1Init(){
  G1.shots=10; G1.score=0; G1.goals=0;
  G1.aimX=AIM_CX; G1.aimY=AIM_CY;
  G1.gk={x:AIM_CX,idealX:AIM_CX,bw:64,bh:134,reach:16,lunge:0};
  G1.phase='aim'; G1.ball=null; G1.shake=0; G1.clock=SHOT_CLOCK;
  G1.msg=''; G1.msgT=0; G1.msgC=C.white; G1.tut=true;
  G1.shooterX=W/2; G1.shooterY=330;
  G1.fhT=(Math.random()*(FH_OPEN+FH_SHUT))|0; G1.fhOpen=false;
  G1.streak=0; G1.maxCombo=0; G1.fiveHoles=0; G1.topCorners=0;
  resetSticks();
}
// the gap between the goalie's legs (five hole)
function g1FiveHole(gk){ return {x:gk.x, y:(NET1.y+NET1.h)-gk.bh*0.20, r:13}; }
function g1Covered(tx,ty,gk){
  // his body+stick cover his whole vertical column (top to bottom)...
  if(Math.abs(tx-gk.x) >= gk.bw/2+gk.reach) return false;   // around him = open
  const fh=g1FiveHole(gk);
  if(G1.fhOpen && dist(tx,ty,fh.x,fh.y) < fh.r) return false; // ...except through the legs WHEN OPEN
  return true;
}
function g1NextShot(){ if(G1.shots<=0){ endGame(G1.score); return; } G1.phase='aim'; G1.ball=null; G1.clock=SHOT_CLOCK; }
function g1Foul(){ G1.phase='foul'; G1.foulT=0; G1.ball=null; G1.streak=0; G1.shake=8; SFX.foul(); }
function g1Fire(){
  const sx=G1.shooterX, sy=G1.shooterY-44, tx=G1.aimX, ty=G1.aimY, d=dist(sx,sy,tx,ty)||1, spd=stickSpd();
  G1.ball={x:sx,y:sy,vx:(tx-sx)/d*spd,vy:(ty-sy)/d*spd,tx,ty,t:0,total:Math.max(8,d/spd)};
  G1.phase='fly'; G1.shots--; G1.gk.lunge=0; sR.dx=0; sR.dy=0; SFX.shoot();
}
function g1Update(){
  if(G1.msgT>0) G1.msgT--; G1.shake*=0.82;
  // difficulty ramps gently across the 10 shots (0 at shot 1 -> 1 at shot 10)
  const d=clamp((10-G1.shots)/9,0,1);
  G1.gk.reach=13+d*8;                                  // ~5% easier coverage
  const openLen=Math.round((FH_OPEN+4)-d*30);          // five hole window 84 -> 54 frames
  G1.fhT=(G1.fhT+1)%(openLen+FH_SHUT); G1.fhOpen=G1.fhT<openLen;
  if(G1.tut){ if(consumeTap()){ G1.tut=false; resetSticks(); } rReleased=false; return; }
  const gk=G1.gk, mn=NET1.x+gk.bw/2+2, mx=NET1.x+NET1.w-gk.bw/2-2;
  // LEFT STICK / WASD: move the attacker in any direction (swings the angle, closes the gap)
  if(G1.phase!=='foul'){
    const moveDx = sL.dx + (keys.moveR?1:0) - (keys.moveL?1:0);
    const moveDy = sL.dy + (keys.moveD?1:0) - (keys.moveU?1:0);
    const mspd=2.8*trainMul();
    G1.shooterX=clamp(G1.shooterX + moveDx*mspd, SH_MINX, SH_MAXX);
    G1.shooterY=clamp(G1.shooterY + moveDy*mspd, SH_MINY, SH_MAXY);
    // cross the crease line = whistle. ref comes out and flags you
    if(G1.phase==='aim' && inCrease(G1.shooterX,G1.shooterY)) g1Foul();
  }
  // goalie plays the angle: slides toward the side the shooter is on (sharper later)
  gk.idealX = clamp(AIM_CX + (G1.shooterX - W/2)*(0.47+d*0.2), mn, mx);

  if(G1.phase==='aim'){
    gk.x += (gk.idealX-gk.x)*(0.055+d*0.055) + Math.sin(frame*0.05)*(0.4+d*0.5); gk.x=clamp(gk.x,mn,mx);
    G1.clock--;
    if(G1.clock<=0){
      // shot-clock violation: this shot is burned
      G1.msg='SHOT CLOCK!'; G1.msgC=C.red; G1.msgT=72; G1.shake=7; G1.streak=0;
      beep(150,0.35,'sawtooth',0.06); G1.shots--; G1.ball=null; G1.phase='result'; G1.resT=42;
      let p; while(consumeTap()){}   // drop any taps so they don't leak into the next shot
    } else {
      if(G1.clock<=120 && G1.clock%60===0) beep(520,0.07,'square',0.05);   // tick the last 2s
      // RIGHT STICK aims; release to shoot
      if(sR.id!==null){
        G1.aimX = clamp(AIM_CX + sR.dx*AIM_EX, AIM_MINX, AIM_MAXX);
        G1.aimY = clamp(AIM_CY + sR.dy*AIM_EY, AIM_MINY, AIM_MAXY);
      } else if(keys.aimL||keys.aimR||keys.aimU||keys.aimD){
        const asp=3.4*trainMul();
        G1.aimX = clamp(G1.aimX + ((keys.aimR?1:0)-(keys.aimL?1:0))*asp, AIM_MINX, AIM_MAXX);
        G1.aimY = clamp(G1.aimY + ((keys.aimD?1:0)-(keys.aimU?1:0))*asp, AIM_MINY, AIM_MAXY);
      }
      let fire=rReleased;
      let p; while((p=consumeTap())){ if(p.x<0) fire=true; }   // space = shoot; drain the rest
      if(fire) g1Fire();
    }
  } else if(G1.phase==='fly'){
    const b=G1.ball; b.x+=b.vx; b.y+=b.vy; b.t++;
    const lc=2.2+d*1.65; const dx=b.tx-gk.x; gk.x=clamp(gk.x+clamp(dx,-lc,lc),mn,mx); gk.lunge=clamp(dx*0.4,-6,6);
    if(b.t>=b.total){
      b.x=b.tx; b.y=b.ty;
      const inNet = b.tx>NET1.x && b.tx<NET1.x+NET1.w && b.ty>NET1.y && b.ty<NET1.y+NET1.h;
      if(!inNet){
        G1.msg='MISSED!'; G1.msgC=C.grey; G1.msgT=64; SFX.wide(); G1.streak=0;
        b.bounce=true;   // sails on past the net
      } else if(g1Covered(b.tx,b.ty,gk)){
        G1.msg='SAVE!'; G1.msgC=C.red; G1.msgT=64; G1.shake=6; SFX.save(); G1.streak=0;
        b.vx=-b.vx*0.3; b.vy=2.6; b.bounce=true;
      } else {
        const fh=g1FiveHole(gk), five=dist(b.tx,b.ty,fh.x,fh.y)<fh.r;
        const vy=(b.ty-NET1.y)/NET1.h, top=vy<0.34, low=vy>0.66;
        let pts,label;
        if(five){ pts=5; label='FIVE HOLE!'; G1.fiveHoles++; }
        else if(top){ pts=5; label='TOP CORNER!'; G1.topCorners++; }
        else if(low){ pts=4; label='LOW CORNER!'; }
        else { pts=3; label='FAR SIDE!'; }
        G1.streak++; if(G1.streak>G1.maxCombo) G1.maxCombo=G1.streak;
        let bonus=0; if(G1.streak>=2){ bonus=G1.streak-1; pts+=bonus; }
        G1.score+=pts; G1.goals++; PROFILE.coins+=pts;   // 1 coin per point scored
        const hot=G1.streak>=3;
        G1.msg=(G1.streak>=2?('x'+G1.streak+' '):'')+label+' +'+pts; G1.msgC=hot?C.gold:(five?C.gold:C.green); G1.msgT=72;
        spawn(b.x,b.y,hot?30:(five?28:20),hot?[C.gold,C.red,C.yellow,C.white]:(five?[C.gold,C.yellow,C.white]:[C.green,C.yellow,C.white]));
        if(hot) beep(700+G1.streak*60,0.1,'square',0.05);
        (pts>=5||hot)?SFX.big():SFX.goal(); b.dead=true;
      }
      G1.phase='result'; G1.resT=42;
    }
  } else if(G1.phase==='result'){
    const b=G1.ball; if(b&&b.bounce){ b.x+=b.vx; b.y+=b.vy; b.vy+=0.3; }
    if(--G1.resT<=0) g1NextShot();
  } else if(G1.phase==='foul'){
    G1.foulT++;
    while(consumeTap()){}   // ignore taps during the whistle
    if(G1.foulT>=120){ G1.shooterY=330; G1.shooterX=clamp(G1.shooterX,SH_MINX,SH_MAXX); G1.shots--; g1NextShot(); }
  }
  rReleased=false;   // only the aim phase consumes the release
  updateParts();
}
function g1Draw(){

  const bx=clamp(gk.x-gk.bw/2-gk.reach,NET1.x,NET1.x+NET1.w);

  if(G1.phase==='aim'){
    const inNet=G1.aimX>NET1.x&&G1.aimX<NET1.x+NET1.w&&G1.aimY>NET1.y&&G1.aimY<NET1.y+NET1.h;
    const open=inNet&&!g1Covered(G1.aimX,G1.aimY,gk);
    const col=!inNet?C.grey:(open?C.green:C.red), blink=frame%8<5;

  }
  if(G1.ball&&!G1.ball.dead) drawBall(G1.ball.x,G1.ball.y,4);
  drawParts();
  drawShooter(G1.shooterX,G1.shooterY,G1.phase==='fly'&&frame%4<2);
  if(G1.phase==='foul') drawRef(G1.foulT);
  ctx.restore();
  // twin joysticks
  const la=sL.id!==null||keys.moveL||keys.moveR;
  const ra=sR.id!==null||keys.aimL||keys.aimR||keys.aimU||keys.aimD;
  drawJoy(LJOY,sL,'MOVE',la,C.blue);

  drawText('SCORE',8,4,1,C.grey); drawText(''+G1.score,8,13,2,C.white);
  drawText('GOALS',W/2-16,4,1,C.grey); drawText(G1.goals+'/10',W/2-16,13,2,C.green);
  drawText('SHOTS',W-58,4,1,C.grey); drawText(''+G1.shots,W-30,13,2,C.yellow);
  // shot clock — depleting bar under the HUD, flashes red in the final 1.25s
  if(!G1.tut && (G1.phase==='aim'||G1.phase==='fly')){
    const frac=clamp(G1.clock/SHOT_CLOCK,0,1), cw=W-12;
    ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.fillRect(6,27,cw,4);

  }

  if(G1.msgT>0) textCS(G1.msg,250+Math.sin(frame*0.3)*2,3,G1.msgC,C.black);

    y+=34;
  }
  textCS('TAP TO RETURN',H-20,1,C.cream,C.black);
}

// ====================== LOCKER ROOM (gear + upgrades) ======================
let lockerTab=0, lockerPart=0;
const PARTS=[
  {key:'num',   label:'JERSEY #'},
  {key:'jersey',label:'JERSEY'},
  {key:'numCol',label:'NUMBER'},
  {key:'helmet',label:'HELMET'},
  {key:'pants', label:'PANTS'},
  {key:'shaft', label:'STICK SHAFT'},
  {key:'head',  label:'STICK HEAD'}
];
function lockerOpen(){ lockerTab=0; lockerPart=0; state=S.LOCKER; }
const LK_TAB1={x:20,y:44,w:124,h:32}, LK_TAB2={x:156,y:44,w:124,h:32};
const LK_PARTL={x:18,y:210,w:32,h:32}, LK_PARTR={x:W-50,y:210,w:32,h:32};
const LK_MINUS={x:58,y:256,w:54,h:50}, LK_PLUS={x:W-112,y:256,w:54,h:50};
const LK_BUY1={x:W-104,y:188,w:84,h:40}, LK_BUY2={x:W-104,y:338,w:84,h:40};
const LK_BACK={x:20,y:H-50,w:W-40,h:40};
function lkSwatch(i){ return {x:33+(i%6)*40, y:262+((i/6)|0)*42, w:34, h:34}; }
function buyUpgrade(key){ const lv=PROFILE[key]; if(lv>=UP_MAX) return; const c=upCost(lv);
  if(PROFILE.coins>=c){ PROFILE.coins-=c; PROFILE[key]=lv+1; profSave(); SFX.big(); }
  else { SFX.save(); pushToast('NOT ENOUGH COINS','SHOP'); } }
function lockerUpdate(){ let p; while((p=consumeTap())){
  if(hit(p,LK_BACK)||p.x<0){ profSave(); state=S.MENU; return; }
  if(hit(p,LK_TAB1)){ lockerTab=0; SFX.ui(); return; }
  if(hit(p,LK_TAB2)){ lockerTab=1; SFX.ui(); return; }
  if(lockerTab===0){
    if(hit(p,LK_PARTL)){ lockerPart=(lockerPart+PARTS.length-1)%PARTS.length; SFX.ui(); return; }
    if(hit(p,LK_PARTR)){ lockerPart=(lockerPart+1)%PARTS.length; SFX.ui(); return; }
    const part=PARTS[lockerPart];
    if(part.key==='num'){
      if(hit(p,LK_MINUS)){ PROFILE.num=(PROFILE.num+99)%100; SFX.ui(); profSave(); return; }
      if(hit(p,LK_PLUS)){ PROFILE.num=(PROFILE.num+1)%100; SFX.ui(); profSave(); return; }
    } else {
      for(let i=0;i<PALETTE.length;i++){ if(hit(p,lkSwatch(i))){ PROFILE[part.key]=PALETTE[i]; SFX.ui(); profSave(); return; } }
    }
  } else {
    if(hit(p,LK_BUY1)){ buyUpgrade('stickLv'); return; }
    if(hit(p,LK_BUY2)){ buyUpgrade('trainLv'); return; }
  }
}}
function drawTab(r,label,on){ ctx.fillStyle=on?C.panelHi:C.panel; ctx.fillRect(r.x,r.y,r.w,r.h);
  ctx.fillStyle=on?C.yellow:C.dgrey; ctx.fillRect(r.x,r.y,r.w,3);
  drawText(label,r.x+(r.w-textW(label,1))/2,r.y+(r.h-5)/2,1,on?C.white:C.cream); }
function drawCard(y0,title,sub,lv,effect,buyR){
  ctx.fillStyle=C.panel; ctx.fillRect(20,y0,W-40,120); ctx.fillStyle=C.dgrey; ctx.fillRect(20,y0,W-40,3);
  drawText(title,30,y0+10,2,C.yellow); drawText(sub,30,y0+34,1,C.grey);
  for(let i=0;i<UP_MAX;i++){ ctx.fillStyle=i<lv?C.green:'#243049'; ctx.fillRect(30+i*((W-100)/UP_MAX),y0+52,((W-100)/UP_MAX)-3,8); }
  drawText('NOW  '+effect,30,y0+70,1,C.cream);
  const maxed=lv>=UP_MAX;
  drawBtn(buyR,false); ctx.fillStyle=maxed?C.gold:C.green; ctx.fillRect(buyR.x,buyR.y,buyR.w,3);
  if(maxed){ drawText('MAXED',buyR.x+(buyR.w-textW('MAXED',1))/2,buyR.y+8,1,C.gold); }
  else { drawText('UPGRADE',buyR.x+(buyR.w-textW('UPGRADE',1))/2,buyR.y+6,1,C.white);
         const ct=upCost(lv)+' C'; drawText(ct,buyR.x+(buyR.w-textW(ct,1))/2,buyR.y+22,1,C.gold); }
}
function drawLocker(){
  vgrad(0,0,W,H,'#10204a','#040814');
  drawTab(LK_TAB1,'GEAR',lockerTab===0); drawTab(LK_TAB2,'UPGRADES',lockerTab===1);
  textC('COINS  '+PROFILE.coins,90,1,C.gold);
  if(lockerTab===0){
    ctx.save(); ctx.translate(W/2,176); ctx.scale(2,2); drawShooter(0,0,false); ctx.restore();
    drawBtn(LK_PARTL,false); glyph('LT',LK_PARTL.x+9,LK_PARTL.y+9,3,C.cream);
    drawBtn(LK_PARTR,false); glyph('GT',LK_PARTR.x+9,LK_PARTR.y+9,3,C.cream);
    const part=PARTS[lockerPart];
    textC(part.label,217,2,C.cream);
    if(part.key==='num'){
      drawBtn(LK_MINUS,false); drawText('-',LK_MINUS.x+(LK_MINUS.w-textW('-',3))/2,LK_MINUS.y+14,3,C.white);
      const ns=''+PROFILE.num; drawText(ns,W/2-textW(ns,5)/2,262,5,C.yellow);
      drawBtn(LK_PLUS,false); drawText('+',LK_PLUS.x+(LK_PLUS.w-textW('+',3))/2,LK_PLUS.y+14,3,C.white);
    } else {
      for(let i=0;i<PALETTE.length;i++){ const r=lkSwatch(i), on=(PROFILE[part.key]===PALETTE[i]);
        ctx.fillStyle=PALETTE[i]; ctx.fillRect(r.x,r.y,r.w,r.h);
        ctx.strokeStyle=on?C.white:'rgba(0,0,0,0.4)'; ctx.lineWidth=on?3:1; ctx.strokeRect(r.x+0.5,r.y+0.5,r.w-1,r.h-1); }
    }
  } else {
    drawCard(150,'STICK','SHOOT FASTER',PROFILE.stickLv,'+'+(3*PROFILE.stickLv)+'% SHOT SPEED',LK_BUY1);
    drawCard(300,'TRAINING','MOVE & AIM FASTER',PROFILE.trainLv,'+'+(4*PROFILE.trainLv)+'% SPEED',LK_BUY2);
  }
  drawBtn(LK_BACK,false); ctx.fillStyle=C.yellow; ctx.fillRect(LK_BACK.x,LK_BACK.y,LK_BACK.w,3);
  drawText('SAVE & BACK',LK_BACK.x+(LK_BACK.w-textW('SAVE & BACK',2))/2,LK_BACK.y+14,2,C.white);
}

// ====================== MAIN LOOP (crash-safe) ======================
function frameStep(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  if(state===S.MENU){ menuUpdate(); drawMenu(); }
  else if(state===S.HELP){ helpUpdate(); drawHelp(); }
  else if(state===S.LOCKER){ lockerUpdate(); drawLocker(); }
  else if(state===S.G1){ g1Update(); g1Draw(); }
  else if(state===S.OVER){ overUpdate(); drawOver(); }
  else if(state===S.SURVEY){ surveyUpdate(); drawSurvey(); }
  else if(state===S.ENTRY){ entryUpdate(); drawEntry(); }
  else if(state===S.LB){ lbUpdate(); drawLeaderboard(); }
  else if(state===S.BADGES){ badgesUpdate(); drawBadges(); }
  drawToasts();
  ctx.globalAlpha=0.05; ctx.fillStyle='#000'; for(let y=0;y<H;y+=3) ctx.fillRect(0,y,W,1); ctx.globalAlpha=1;
}
let lastErr='';
function loop(){
  frame++;
  try{ frameStep(); }
  catch(e){
    // never freeze on a blank screen — show the error and let the user tap back to menu
    lastErr=(''+(e&&e.message||e)).slice(0,40);
    ctx.fillStyle='#101626'; ctx.fillRect(0,0,W,H);
    textCS('OOPS',120,4,C.red,C.black);
    textC('SOMETHING GLITCHED',170,1,C.cream);
    textC(lastErr||'UNKNOWN',192,1,C.grey);
    textC('TAP TO RETURN TO MENU',240,1,C.yellow);
    if(consumeTap()){ state=S.MENU; menuSel=0; }
  }
  pressQueue.length=0;
  requestAnimationFrame(loop);
}
loop();

})();
</script>
