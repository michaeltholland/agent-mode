<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>Lacrosse Shootout</title>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  html,body { margin:0; padding:0; height:100%; background:#05070f; overflow:hidden; font-family:'Courier New',monospace; touch-action:none; }
  #wrap { position:relative; width:100%; height:100%; }
  canvas { position:absolute; }
  #c { image-rendering:pixelated; image-rendering:crisp-edges; background:#000; box-shadow:0 0 0 3px #141a30, 0 0 50px #000; }
  #t { background:transparent; pointer-events:auto; cursor:pointer; }
</style>

<body>
<div id="wrap"><canvas id="c" width="300" height="540"></canvas><canvas id="t"></canvas></div>
<script>
(function(){
"use strict";

// ====================== SETUP ======================
const W=300, H=540;
const canvas=document.getElementById('c');     // sprite layer - low-res, pixelated (hard retro edges)
const tcanvas=document.getElementById('t');     // text layer - hi-res, smooth (readable)
const ctx=canvas.getContext('2d');
const tctx=tcanvas.getContext('2d');
ctx.imageSmoothingEnabled=false;
function resize(){
  const aw=window.innerWidth, ah=window.innerHeight;
  const s=Math.min(aw/W, ah/H);
  const cw=Math.round(W*s), ch=Math.round(H*s), left=Math.round((aw-cw)/2), top=Math.round((ah-ch)/2);
  for(const cv of [canvas,tcanvas]){ cv.style.left=left+'px'; cv.style.top=top+'px'; cv.style.width=cw+'px'; cv.style.height=ch+'px'; }
  const pxs=Math.min(3, Math.max(2, Math.ceil((window.devicePixelRatio||1)*s)));  // text rendered at device res = crisp
  tcanvas.width=W*pxs; tcanvas.height=H*pxs;
  tctx.setTransform(pxs,0,0,pxs,0,0);
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,100));
resize();

// ====================== PALETTE ======================
const C={
  skyTop:'#3a6ea5',skyBot:'#9ed0ee',
  grass1:'#2f9e44',grass2:'#268c3a',grass3:'#1f7a31',
  orange:'#ff8a1e',orangeHi:'#ffb347',orangeDk:'#c75a00',
  mesh:'rgba(255,255,255,0.30)',
  gk:'#e23b4e',gkHi:'#ff6276',gkDk:'#8d1f2c',pad:'#f0f2ff',
  skin:'#ffce9e',jersey:'#15151c',jerseyHi:'#34343f',num:'#ffffff',
  helmet:'#f4f6ff',helmetSh:'#c3c8da',shaft:'#d7d9e0',crosse:'#b9a7d6',
  ball:'#fff7ea',ballSh:'#d9c9a8',
  white:'#ffffff',cream:'#ffe9c2',yellow:'#ffd23f',gold:'#ffb000',
  red:'#ff3b56',green:'#3fe06a',blue:'#43b4ff',grey:'#8b93a7',
  dgrey:'#3a4256',black:'#0a0c12',panel:'#101626',panelHi:'#1d2740',btn:'#243154',btnA:'#3c63b0'
};

// ====================== FONT ======================
const FONT={
 'A':["01110","10001","11111","10001","10001"],'B':["11110","10001","11110","10001","11110"],
 'C':["01111","10000","10000","10000","01111"],'D':["11110","10001","10001","10001","11110"],
 'E':["11111","10000","11110","10000","11111"],'F':["11111","10000","11110","10000","10000"],
 'G':["01111","10000","10011","10001","01111"],'H':["10001","10001","11111","10001","10001"],
 'I':["11111","00100","00100","00100","11111"],'J':["00111","00010","00010","10010","01100"],
 'K':["10001","10010","11100","10010","10001"],'L':["10000","10000","10000","10000","11111"],
 'M':["10001","11011","10101","10001","10001"],'N':["10001","11001","10101","10011","10001"],
 'O':["01110","10001","10001","10001","01110"],'P':["11110","10001","11110","10000","10000"],
 'Q':["01110","10001","10101","10010","01101"],'R':["11110","10001","11110","10010","10001"],
 'S':["01111","10000","01110","00001","11110"],'T':["11111","00100","00100","00100","00100"],
 'U':["10001","10001","10001","10001","01110"],'V':["10001","10001","10001","01010","00100"],
 'W':["10001","10001","10101","11011","10001"],'X':["10001","01010","00100","01010","10001"],
 'Y':["10001","01010","00100","00100","00100"],'Z':["11111","00010","00100","01000","11111"],
 '0':["01110","10011","10101","11001","01110"],'1':["00100","01100","00100","00100","01110"],
 '2':["11110","00001","01110","10000","11111"],'3':["11110","00001","01110","00001","11110"],
 '4':["10010","10010","11111","00010","00010"],'5':["11111","10000","11110","00001","11110"],
 '6':["01111","10000","11110","10001","01110"],'7':["11111","00010","00100","01000","01000"],
 '8':["01110","10001","01110","10001","01110"],'9':["01110","10001","01111","00001","11110"],
 '!':["00100","00100","00100","00000","00100"],'?':["01110","10001","00110","00000","00100"],
 ':':["00000","00100","00000","00100","00000"],'.':["00000","00000","00000","00000","00100"],
 '-':["00000","00000","11111","00000","00000"],'+':["00000","00100","01110","00100","00000"],
 '/':["00001","00010","00100","01000","10000"],'L4':[],
 'LT':["00010","00100","01000","00100","00010"],'GT':["01000","00100","00010","00100","01000"],
 'UP':["00100","01110","10101","00100","00100"],'DN':["00100","00100","10101","01110","00100"],
 ' ':["00000","00000","00000","00000","00000"]
};
// crisp, readable real font on the hi-res text layer (sprites stay pixel-art on the layer below)
function lxFont(s){ return 'bold '+Math.round(7.5*(s||1))+'px "Trebuchet MS",system-ui,-apple-system,"Segoe UI",Arial,sans-serif'; }
function drawText(str,x,y,s,col){ s=s||1; tctx.font=lxFont(s); tctx.textBaseline='top'; tctx.textAlign='left'; tctx.fillStyle=col||C.white; tctx.fillText(''+str,x,y); return x+tctx.measureText(''+str).width; }
function textW(str,s){ tctx.font=lxFont(s||1); return tctx.measureText(''+str).width; }
function textC(str,y,s,col){ drawText(str,(W-textW(str,s))/2,y,s,col); }
function textS(str,x,y,s,col,sh){ const o=Math.max(1,Math.round((s||1))); drawText(str,x+o,y+o,s,sh||C.black); drawText(str,x,y,s,col); }
function textCS(str,y,s,col,sh){ textS(str,(W-textW(str,s))/2,y,s,col,sh); }
// glyph helpers for arrow icons (size in px)
function glyph(name,x,y,s,col){ ctx.fillStyle=col||C.white; const g=FONT[name]; for(let r=0;r<5;r++)for(let i=0;i<5;i++) if(g[r][i]==='1') ctx.fillRect(x+i*s,y+r*s,s,s); }

// ====================== INPUT ======================
let pressQueue=[];
let pointers={};
let keys={moveL:false,moveR:false,moveU:false,moveD:false,aimL:false,aimR:false,aimU:false,aimD:false};
let spaceDown=false;
// twin virtual joysticks (bottom corners)
const LJOY={cx:64,cy:470,r:48,k:24};
const RJOY={cx:W-64,cy:470,r:48,k:24};
let sL={id:null,dx:0,dy:0};
let sR={id:null,dx:0,dy:0};
let rReleased=false;           // edge flag: right stick was just let go
function inJoy(j,x,y){ return Math.hypot(x-j.cx,y-j.cy)<=j.r+28; }
function setJoy(j,s,x,y){ s.dx=clamp((x-j.cx)/j.r,-1,1); s.dy=clamp((y-j.cy)/j.r,-1,1); }
function resetSticks(){ sL.id=null; sL.dx=0; sL.dy=0; sR.id=null; sR.dx=0; sR.dy=0; rReleased=false; }
function pt(clientX,clientY){ const r=tcanvas.getBoundingClientRect(); return {x:(clientX-r.left)/(r.width/W), y:(clientY-r.top)/(r.height/H)}; }
function down(id,x,y){
  unlockAudio(); pointers[id]={x,y}; pressQueue.push({x,y});
  shareArm = (shareBtn && hit({x:x,y:y},shareBtn)) ? Object.assign({},shareBtn) : null;   // only share if the tap STARTED on the share button
  if(sL.id===null && inJoy(LJOY,x,y)){ sL.id=id; setJoy(LJOY,sL,x,y); }
  else if(sR.id===null && inJoy(RJOY,x,y)){ sR.id=id; setJoy(RJOY,sR,x,y); }
}
function move(id,x,y){
  if(pointers[id]) pointers[id]={x,y};
  if(id===sL.id) setJoy(LJOY,sL,x,y);
  if(id===sR.id) setJoy(RJOY,sR,x,y);
}
function up(id){
  delete pointers[id];
  if(id===sL.id){ sL.id=null; sL.dx=0; sL.dy=0; }
  if(id===sR.id){ sR.id=null; rReleased=true; }   // keep dx,dy so the game can shoot where it pointed
}
tcanvas.addEventListener('mousedown',e=>{ e.preventDefault(); const p=pt(e.clientX,e.clientY); down('m',p.x,p.y); });
window.addEventListener('mousemove',e=>{ if(pointers['m']){ const p=pt(e.clientX,e.clientY); move('m',p.x,p.y); } });
window.addEventListener('mouseup',e=>{ const p=pt(e.clientX,e.clientY); up('m'); tryShareAt(p); });
tcanvas.addEventListener('touchstart',e=>{ e.preventDefault(); for(const t of e.changedTouches){ const p=pt(t.clientX,t.clientY); down(t.identifier,p.x,p.y); } },{passive:false});
tcanvas.addEventListener('touchmove',e=>{ e.preventDefault(); for(const t of e.changedTouches){ const p=pt(t.clientX,t.clientY); move(t.identifier,p.x,p.y); } },{passive:false});
tcanvas.addEventListener('touchend',e=>{ e.preventDefault(); for(const t of e.changedTouches){ up(t.identifier); tryShareAt(pt(t.clientX,t.clientY)); } },{passive:false});
tcanvas.addEventListener('touchcancel',e=>{ for(const t of e.changedTouches) up(t.identifier); });
tcanvas.addEventListener('dblclick',e=>e.preventDefault());
tcanvas.addEventListener('gesturestart',e=>e.preventDefault());
window.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='Enter'){ e.preventDefault(); if(!spaceDown){ pressQueue.push({x:-1,y:-1}); spaceDown=true; } }
  if(e.code==='KeyA') keys.moveL=true; if(e.code==='KeyD') keys.moveR=true;
  if(e.code==='KeyW') keys.moveU=true; if(e.code==='KeyS') keys.moveD=true;
  if(e.code==='ArrowLeft') keys.aimL=true; if(e.code==='ArrowRight') keys.aimR=true;
  if(e.code==='ArrowUp') keys.aimU=true; if(e.code==='ArrowDown') keys.aimD=true;
});
window.addEventListener('keyup',e=>{
  if(e.code==='Space'||e.code==='Enter') spaceDown=false;
  if(e.code==='KeyA') keys.moveL=false; if(e.code==='KeyD') keys.moveR=false;
  if(e.code==='KeyW') keys.moveU=false; if(e.code==='KeyS') keys.moveD=false;
  if(e.code==='ArrowLeft') keys.aimL=false; if(e.code==='ArrowRight') keys.aimR=false;
  if(e.code==='ArrowUp') keys.aimU=false; if(e.code==='ArrowDown') keys.aimD=false;
});
function consumeTap(){ return pressQueue.length?pressQueue.shift():null; }
function hit(p,r){ return p && p.x>=r.x && p.x<=r.x+r.w && p.y>=r.y && p.y<=r.y+r.h; }
function held(r){ for(const id in pointers){ const q=pointers[id]; if(q.x>=r.x&&q.x<=r.x+r.w&&q.y>=r.y&&q.y<=r.y+r.h) return true; } return false; }

// ====================== SOUND ======================
let actx=null;
function ac(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return actx; }
function unlockAudio(){ const a=ac(); if(a&&a.state==='suspended') a.resume(); }
function beep(f,d,t,v){ const a=ac(); if(!a) return; try{ const o=a.createOscillator(),g=a.createGain();
  o.type=t||'square'; o.frequency.value=f; g.gain.value=v||0.05; o.connect(g); g.connect(a.destination);
  const n=a.currentTime; o.start(n); g.gain.setValueAtTime(g.gain.value,n); g.gain.exponentialRampToValueAtTime(0.0001,n+(d||0.1)); o.stop(n+(d||0.1)); }catch(e){} }
function foulSound(){ const a=ac(); if(!a) return; try{
  // classic sad-trombone "wah wah wah waaaah" - brassy sawtooth notes that each bend down
  const notes=[[392,370,0.22],[349,330,0.22],[311,294,0.24],[262,180,0.75]];
  let t=a.currentTime;
  for(const [f0,f1,d] of notes){ const o=a.createOscillator(), g=a.createGain();
    o.type='sawtooth'; o.connect(g); g.connect(a.destination);
    o.frequency.setValueAtTime(f0,t); o.frequency.linearRampToValueAtTime(f1,t+d);
    g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(0.075,t+0.03); g.gain.exponentialRampToValueAtTime(0.0001,t+d);
    o.start(t); o.stop(t+d+0.03); t+=d*0.9; }
}catch(e){} }
const SFX={
  shoot:()=>{ beep(720,0.06,'square',0.05); setTimeout(()=>beep(420,0.05),40); },
  foul:()=>foulSound(),
  goal:()=>{ beep(523,0.08); setTimeout(()=>beep(659,0.08),80); setTimeout(()=>beep(880,0.16),160); },
  save:()=>beep(120,0.22,'sawtooth',0.06),
  wide:()=>beep(180,0.16,'sine',0.05),
  big:()=>{ beep(660,0.07); setTimeout(()=>beep(880,0.07),70); setTimeout(()=>beep(1175,0.16),140); },
  ui:()=>beep(840,0.05,'square',0.05),
  start:()=>{ beep(523,0.07); setTimeout(()=>beep(784,0.12),80); }
};

// ====================== HELPERS ======================
function rnd(a,b){ return a+Math.random()*(b-a); }
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function lerp(a,b,t){ return a+(b-a)*t; }
function dist(ax,ay,bx,by){ return Math.hypot(ax-bx,ay-by); }
function vgrad(x,y,w,h,c1,c2){ const g=ctx.createLinearGradient(x,y,x,y+h); g.addColorStop(0,c1); g.addColorStop(1,c2); ctx.fillStyle=g; ctx.fillRect(x,y,w,h); }
const HI={g1:0};
try{ HI.g1=+localStorage.getItem('lax4_hi1')||0; }catch(e){}
function saveHi(){ try{ localStorage.setItem('lax4_hi1',HI.g1); }catch(e){} }
// leaderboard
let LB=[], LBTOTAL=0;     // LBTOTAL = total players worldwide (for the top-30% cut + titles)
try{ LB=JSON.parse(localStorage.getItem('lax4_lb')||'[]')||[]; if(!Array.isArray(LB)) LB=[]; }catch(e){ LB=[]; }
LBTOTAL=LB.length;
function lbSave(){ try{ localStorage.setItem('lax4_lb',JSON.stringify(LB)); }catch(e){} }
function lbQualifies(s){ return s>0 && (LB.length<10 || s>LB[LB.length-1].s); }
function lbInsert(n,s){ LB.push({n:n,s:s}); LB.sort((a,b)=>b.s-a.s); LB=LB.slice(0,60); lbSave(); return LB.indexOf(LB.find(e=>e.n===n&&e.s===s)); }
// rank titles: a new tier every 25 players - Six Nations (Haudenosaunee) clan animals, top down to lowest
const TITLES=['BEAR CLAN','WOLF CLAN','TURTLE CLAN','HAWK CLAN','EEL CLAN','HERON CLAN','BEAVER CLAN','SNIPE CLAN','DEER CLAN'];
const TIER_COL=['#ffd23f','#cfd6e6','#d9974f','#7fd8ff','#37c66b','#7a5cff','#ff5ca8','#caa86a','#9aa3b2'];
function rankTier(rank){ return Math.floor((Math.max(1,rank)-1)/25); }
function rankTitle(rank){ const t=rankTier(rank); return t<TITLES.length?TITLES[t]:('TIER '+(t+1)); }
function tierColor(rank){ return TIER_COL[rankTier(rank)%TIER_COL.length]; }
// how many rows to show: the top 30% of the world (but always at least a full top 10)
function lbShownCount(){ const total=LBTOTAL||LB.length; return clamp(Math.ceil(total*0.3), Math.min(10,LB.length), LB.length); }
// ---- global leaderboard (Supabase) ----
const SUPA_URL='https://xmmhaylumsdktljmxjgv.supabase.co';
const SUPA_KEY='sb_publishable_MkMrj9PwzdNqUIua69e7Gg_F1uydGSt';
const SUPA_HEAD={apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY};
let lbStatus='local';   // local | loading | global | offline
function lbFetch(){
  if(typeof fetch!=='function') return;
  lbStatus='loading';
  fetch(SUPA_URL+'/rest/v1/scores?select=name,score&order=score.desc&limit=60',{headers:Object.assign({Prefer:'count=exact'},SUPA_HEAD)})
    .then(res=>{ if(!res.ok) return Promise.reject(res.status); const cr=res.headers&&res.headers.get&&res.headers.get('content-range'); LBTOTAL=(cr&&cr.indexOf('/')>=0)?(parseInt(cr.split('/')[1])||0):0; return res.json(); })
    .then(rows=>{ if(Array.isArray(rows)){ LB=rows.map(r=>({n:(''+r.name).slice(0,3).toUpperCase(),s:r.score|0})); if(!LBTOTAL) LBTOTAL=LB.length; lbSave(); lbStatus='global'; } })
    .catch(()=>{ lbStatus='offline'; });
}
function lbSubmit(name,score){
  if(typeof fetch!=='function') return;
  fetch(SUPA_URL+'/rest/v1/scores',{method:'POST',headers:Object.assign({'Content-Type':'application/json',Prefer:'return=minimal'},SUPA_HEAD),body:JSON.stringify({name:name,score:score})})
    .then(r=>{ if(r.ok) lbFetch(); else lbStatus='offline'; })
    .catch(()=>{ lbStatus='offline'; });
}
lbFetch();   // prime the world board on load
// career stats + badges
let STATS={games:0,goals:0,bestCombo:0,fiveHoles:0,topCorners:0,perfects:0};
try{ STATS=Object.assign(STATS, JSON.parse(localStorage.getItem('lax4_stats')||'{}')||{}); }catch(e){}
function statsSave(){ try{ localStorage.setItem('lax4_stats',JSON.stringify(STATS)); }catch(e){} }
function curLevel(){ return (PROFILE&&PROFILE.level)||1; }    // earned by clearing the 5 targets
function diffFactor(){ const off=[-0.3,0,0.35][(PROFILE&&PROFILE.diff!=null)?PROFILE.diff:1]||0; return clamp((curLevel()-1)/30,0,0.85)+off; }  // difficulty + ROOKIE/PRO/ELITE offset
// ---- player profile: appearance, coins, upgrades ----
const PALETTE=['#e23b3b','#ff8c1a','#ffd23f','#37c66b','#1f9be0','#7a5cff','#ff5ca8','#ffffff','#0e1322','#1f2633','#9aa3b2','#7a5a2b'];
let PROFILE={num:15,jersey:'#e23b3b',numCol:'#ffffff',helmet:'#0e1322',pants:'#1f2633',shaft:'#7a5a2b',head:'#ff8c1a',coins:0,stickLv:0,trainLv:0,accLv:0,initials:'',level:1,diff:1};
try{ PROFILE=Object.assign(PROFILE, JSON.parse(localStorage.getItem('lax4_profile')||'{}')||{}); }catch(e){}
function profSave(){ try{ localStorage.setItem('lax4_profile',JSON.stringify(PROFILE)); }catch(e){} }
function shade(hex,p){ const n=parseInt((hex||'#000').slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=clamp(Math.round(r+255*p),0,255); g=clamp(Math.round(g+255*p),0,255); b=clamp(Math.round(b+255*p),0,255); return 'rgb('+r+','+g+','+b+')'; }
const UP_MAX=23;                          // 3 tracks x 23 = 69 buyable upgrades
const stickSpd=()=>10.6*(1+0.03*PROFILE.stickLv);         // +3% shot speed / level
const trainMul=()=>1+0.04*PROFILE.trainLv;                // +4% move & aim speed / level
// shot accuracy: loose for rookies, tightens naturally with level AND with the accuracy upgrade
function shotSkill(){ return clamp((curLevel()-1)/40 + PROFILE.accLv*0.04, 0, 1); }
function shotLoose(){ return lerp(12, 1.5, shotSkill()); }   // px of scatter on the target
function upCost(lv){ return 20*(lv+1); }                  // 20,40,60... coins
let ACH_DONE={};
try{ ACH_DONE=JSON.parse(localStorage.getItem('lax4_ach')||'{}')||{}; }catch(e){ ACH_DONE={}; }
function achSave(){ try{ localStorage.setItem('lax4_ach',JSON.stringify(ACH_DONE)); }catch(e){} }
const ACH=[
  {id:'first',  n:'FIRST BLOOD', d:'SCORE YOUR FIRST GOAL'},
  {id:'snipe',  n:'SNIPER',      d:'SCORE A TOP CORNER'},
  {id:'five',   n:'5 HOLE HERO', d:'SCORE THROUGH THE LEGS'},
  {id:'hat',    n:'HAT TRICK',   d:'3 GOALS IN ONE GAME'},
  {id:'combo3', n:'ON FIRE',     d:'3 GOALS IN A ROW'},
  {id:'combo5', n:'UNCONSCIOUS', d:'5 GOALS IN A ROW'},
  {id:'sharp',  n:'SHARPSHOOTER',d:'7+ GOALS IN A GAME'},
  {id:'perfect',n:'PERFECT TEN', d:'SCORE ALL 10 SHOTS'},
  {id:'s25',    n:'GOAL GETTER', d:'25+ POINTS IN A GAME'},
  {id:'s35',    n:'DEADEYE',     d:'35+ POINTS IN A GAME'},
  {id:'vet',    n:'VETERAN',     d:'PLAY 10 GAMES'},
  {id:'cent',   n:'CENTURION',   d:'100 CAREER GOALS'}
];
function medalFor(s){ return s>=40?{n:'PLATINUM',c:'#9fe6ff'}:s>=30?{n:'GOLD',c:'#ffd23f'}:s>=20?{n:'SILVER',c:'#d6dcea'}:s>=10?{n:'BRONZE',c:'#d9974f'}:null; }
let parts=[];
function spawn(x,y,n,cols,sp){ sp=sp||2.6; for(let i=0;i<n;i++) parts.push({x,y,vx:rnd(-sp,sp),vy:rnd(-sp*1.3,-0.3),life:rnd(24,46),c:cols[(Math.random()*cols.length)|0]}); }
function updateParts(){ for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.14; p.life--; if(p.life<=0) parts.splice(i,1); } }
function drawParts(){ for(const p of parts){ ctx.fillStyle=p.c; const s=p.life>14?2:1; ctx.fillRect(p.x|0,p.y|0,s+1,s+1); } }

// ====================== SPRITES ======================
function drawBall(x,y,r){ r=r||4;
  ctx.fillStyle=C.ballSh; ctx.beginPath(); ctx.arc(x,y+1,r,0,7); ctx.fill();
  ctx.fillStyle=C.ball; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.fillRect(x-r+1,y-r+1,2,2);
}

function drawGoalie(x,baseY,bw,bh,lunge,fh,fhOpen){

const PLAYER_R=10;                                // other players' radius (collision + shot block)
const CREASE={cx:AIM_CX, cy:NET1.y+NET1.h, r:74};
function inCrease(x,y){ return (y-CREASE.cy)>0 && dist(x,y,CREASE.cx,CREASE.cy)<CREASE.r; }
// ---- 10 players anchored to home spots with LIMITED range (foosball/table-hockey style) ----
let players=[];
const PLAYER_HOMES=[
  // 5 DEFENDERS strung across the shooting lane in front of the goal
  {x:88,y:250,t:'D'},{x:150,y:236,t:'D'},{x:212,y:250,t:'D'},{x:118,y:300,t:'D'},{x:182,y:300,t:'D'},
  // 5 OFFENSE teammates out at the sides / up top / deep (clear of the cage)
  {x:30,y:150,t:'O'},{x:W-30,y:150,t:'O'},{x:34,y:370,t:'O'},{x:W-34,y:370,t:'O'},{x:150,y:408,t:'O'}
];
function spawnPlayers(){ players=PLAYER_HOMES.map(h=>({team:h.t, hx:h.x, hy:h.y, x:h.x, y:h.y,
  ph:rnd(0,6.28), spd:0.018+rnd(0,0.018), rng:(h.t==='D'?26:16)+rnd(0,8), flash:0})); }
function keepOutOfNet(p){
  if(p.x>NETBOX.x-PLAYER_R&&p.x<NETBOX.x+NETBOX.w+PLAYER_R&&p.y>NETBOX.y-PLAYER_R&&p.y<NETBOX.y+NETBOX.h+PLAYER_R){
    const dl=p.x-(NETBOX.x-PLAYER_R),dr=(NETBOX.x+NETBOX.w+PLAYER_R)-p.x,dt=p.y-(NETBOX.y-PLAYER_R),db=(NETBOX.y+NETBOX.h+PLAYER_R)-p.y,m=Math.min(dl,dr,dt,db);
    if(m===dl)p.x=NETBOX.x-PLAYER_R;else if(m===dr)p.x=NETBOX.x+NETBOX.w+PLAYER_R;else if(m===dt)p.y=NETBOX.y-PLAYER_R;else p.y=NETBOX.y+NETBOX.h+PLAYER_R; }
}
function updatePlayers(){ for(const p of players){ if(p.flash>0)p.flash--; p.ph+=p.spd;
  p.x = p.hx + Math.sin(p.ph)*p.rng + Math.sin(p.ph*5.7)*2;     // slide along the rod + tiny vibrate
  p.y = p.hy + Math.sin(p.ph*0.6)*7 + Math.cos(p.ph*6.3)*1.5;   // small drift + jitter
  keepOutOfNet(p); } }
function drawPlayer(p){

  textCS('WELCOME!',H/2-130,4,C.yellow,C.black);
  const lines=['THANKS FOR PLAYING!','','BRAND NEW - THE FIRST','EVER VERSION!','','CUSTOMIZE IN THE LOCKER','ROOM, THEN BURY CORNERS.','','FEEDBACK = TAP THE STARS','HAVE FUN!'];
  let y=H/2-98; for(const l of lines){ if(l) textCS(l,y,1.5,C.cream,C.black); y+=16; }
  drawBtn(WEL_BTN,false); ctx.fillStyle=C.green; ctx.fillRect(WEL_BTN.x,WEL_BTN.y,WEL_BTN.w,3);
  drawText('PLAY BALL',WEL_BTN.x+(WEL_BTN.w-textW('PLAY BALL',2))/2,WEL_BTN.y+15,2,C.white);
}

// ====================== LACROSSE TRIVIA (earn coins) ======================
const TRIVIA_REWARD=15;
const TRIVIA_Q=[
  {q:'WHO ORIGINATED LACROSSE?',opts:['HAUDENOSAUNEE (SIX NATIONS)','ANCIENT ROMANS','THE VIKINGS'],ans:0,fact:'THE HAUDENOSAUNEE - IT IS THE CREATORS GAME.'},
  {q:'LACROSSE IS NICKNAMED THE...',opts:['CREATORS GAME','KINGS GAME','WINTER GAME'],ans:0,fact:'THE CREATORS GAME - PLAYED FOR CEREMONY AND HEALING.'},
  {q:'THE NO-GO ZONE AT THE GOAL IS THE...',opts:['CREASE','THE PAINT','THE BOX'],ans:0,fact:'THE CREASE - OFFENSE CANNOT STEP INSIDE IT.'},
  {q:'A SHOT BETWEEN THE GOALIES LEGS IS THE...',opts:['FIVE HOLE','THE GUTTER','THE SLOT'],ans:0,fact:'THE FIVE HOLE - SAME TERM AS HOCKEY.'},
  {q:'MENS FIELD LACROSSE - PLAYERS PER SIDE?',opts:['10','6','8'],ans:0,fact:'10 PLAYERS - INCLUDING THE GOALIE.'},
  {q:'BOX LACROSSE - PLAYERS PER SIDE?',opts:['6','10','5'],ans:0,fact:'6 - FIVE RUNNERS AND A GOALIE.'},
  {q:'THREE GOALS IN ONE GAME IS A...',opts:['HAT TRICK','A TURKEY','A TRIPLE'],ans:0,fact:'A HAT TRICK - THREE GOALS BY ONE PLAYER.'},
  {q:'LACROSSE RETURNS TO THE OLYMPICS IN...',opts:['2028','2032','2024'],ans:0,fact:'LA 2028 - PLAYED AS LACROSSE SIXES.'},
  {q:'THE LACROSSE STICK IS ALSO CALLED A...',opts:['CROSSE','A BAT','A PADDLE'],ans:0,fact:'A CROSSE - FROM THE FRENCH WORD.'},
  {q:'A GREAT SHOOTER SHOOTS WITH...',opts:['PURPOSE','PURE POWER','EYES CLOSED'],ans:0,fact:'PURPOSE - PICK THE OPEN SPOT, DONT JUST RIP IT.'},
  {q:'GREAT SHOOTERS CREATE BETTER...',opts:['ANGLES','EXCUSES','ONLY SPEED'],ans:0,fact:'ANGLES - BODY POSITION OPENS UP THE NET.'},
  {q:'GREAT SHOOTERS READ THE...',opts:['GOALIE','CROWD','SCOREBOARD'],ans:0,fact:'THE GOALIE - WATCH HIS HANDS AND FEET FIRST.'},
  {q:'LACROSSE IS THE FASTEST SPORT ON TWO...',opts:['FEET','WHEELS','SKATES'],ans:0,fact:'THE FASTEST SPORT ON TWO FEET.'},
  {q:'A BOUNCE SHOT SKIPS OFF THE...',opts:['TURF','CROSSBAR','GOALIE'],ans:0,fact:'THE TURF - A SKIP SHOT IS HARD TO READ.'},
  {q:'GREAT SHOOTERS SHOOT AT THE RIGHT...',opts:['MOMENT','PRICE','ANGLE ONLY'],ans:0,fact:'THE RIGHT MOMENT - WHEN THE LANE OPENS UP.'}
];
let trivia={q:null,order:[0,1,2],correct:0,picked:-1,answered:false};
let triviaSeen=false;   // once per session: only the first game of a session asks
function triviaStart(){
  if(triviaSeen){ g1Init(); state=S.G1; return; }   // already asked this session - straight to play
  triviaSeen=true;
  const q=TRIVIA_Q[(Math.random()*TRIVIA_Q.length)|0];
  const order=q.opts.map((_,i)=>i);
  for(let i=order.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; const t=order[i]; order[i]=order[j]; order[j]=t; }
  trivia={q:q, order:order, correct:order.indexOf(q.ans), picked:-1, answered:false};
  state=S.TRIVIA;
}
function wrapText(str,maxC){ const w=(''+str).split(' '), out=[]; let cur='';
  for(const word of w){ if((cur+' '+word).trim().length<=maxC) cur=(cur?cur+' ':'')+word; else { if(cur)out.push(cur); cur=word; } }
  if(cur) out.push(cur); return out; }
function triOpt(i){ return {x:24,y:204+i*52,w:W-48,h:46}; }
function triviaUpdate(){ let p; while((p=consumeTap())){
  if(!trivia.answered){
    for(let i=0;i<trivia.order.length;i++){ if(hit(p,triOpt(i))){ trivia.picked=i; trivia.answered=true;
      if(i===trivia.correct){ PROFILE.coins+=TRIVIA_REWARD; profSave(); SFX.big(); } else SFX.save(); return; } }
  } else { g1Init(); state=S.G1; return; }   // any tap -> play
}}
function drawTrivia(){
  vgrad(0,0,W,H,'#10204a','#040814');
  textCS('LACROSSE TRIVIA',44,3,C.gold,C.black);
  textC(trivia.answered?'':'ANSWER RIGHT = +'+TRIVIA_REWARD+' COINS',74,1.3,C.green);
  const ql=wrapText(trivia.q.q,26); let qy=104; for(const l of ql){ textCS(l,qy,1.5,C.cream,C.black); qy+=22; }
  for(let i=0;i<trivia.order.length;i++){ const r=triOpt(i), label=trivia.q.opts[trivia.order[i]];
    let col=C.panel, bc=C.dgrey, tc=C.cream;
    if(trivia.answered){ if(i===trivia.correct){ col='#16633a'; bc=C.green; } else if(i===trivia.picked){ col='#5e1b25'; bc=C.red; tc=C.cream; } else { tc=C.grey; } }
    ctx.fillStyle=col; ctx.fillRect(r.x,r.y,r.w,r.h); ctx.fillStyle=bc; ctx.fillRect(r.x,r.y,r.w,3); ctx.fillRect(r.x,r.y+r.h-3,r.w,3);
    drawText(label,r.x+(r.w-textW(label,1.3))/2,r.y+(r.h-7)/2,1.3,tc); }
  if(trivia.answered){ const right=trivia.picked===trivia.correct;
    textCS(right?('CORRECT!  +'+TRIVIA_REWARD+' COINS'):'BETTER LUCK NEXT TIME',372,1.6,right?C.green:C.red,C.black);
    const fl=wrapText(trivia.q.fact,32); let fy=398; for(const l of fl){ textC(l,fy,1.2,C.cream); fy+=18; }
    if(frame%24<16) textCS('TAP TO PLAY BALL',H-24,1.5,C.yellow,C.black);
  } else textC('TAP YOUR ANSWER',H-24,1.3,C.grey);
}

// ====================== BADGES SCREEN ======================
function badgesUpdate(){ let p; while((p=consumeTap())){ state=S.MENU; return; } }
function drawBadges(){
  vgrad(0,0,W,H,'#10204a','#040814');
  ctx.fillStyle=C.panelHi; ctx.fillRect(12,12,80,36); ctx.fillStyle=C.dgrey; ctx.fillRect(12,12,80,3);

  }
  textCS('TAP TO RETURN',H-20,1,C.cream,C.black);
}

// ====================== LOCKER ROOM (gear + upgrades) ======================
let lockerTab=0, lockerPart=0;
const PARTS=[
  {key:'initials',label:'INITIALS'},
  {key:'num',   label:'JERSEY #'},
  {key:'jersey',label:'JERSEY'},
  {key:'numCol',label:'NUMBER'},
  {key:'helmet',label:'HELMET'},
  {key:'pants', label:'PANTS'},
  {key:'shaft', label:'STICK SHAFT'},
  {key:'head',  label:'STICK HEAD'}
];
const LK_INI=[0,1,2].map(i=>({ up:{x:54+i*68,y:248,w:54,h:30}, box:{x:54+i*68,y:282,w:54,h:40}, dn:{x:54+i*68,y:326,w:54,h:30} }));
function iniChar(i){ const s=(PROFILE.initials||'AAA').toUpperCase().padEnd(3,'A'); return s.charAt(i)||'A'; }
function cycleIni(i,d){ let c=(iniChar(i).charCodeAt(0)-65+26+d)%26; const a=(PROFILE.initials||'AAA').toUpperCase().padEnd(3,'A').split(''); a[i]=String.fromCharCode(65+c); PROFILE.initials=a.join(''); SFX.ui(); }
// appearance is edited on a working copy; SAVE commits it, BACK discards it (purchases always commit)
const APPEAR_KEYS=['num','jersey','numCol','helmet','pants','shaft','head','initials'];
let lockerSnap={};
function lockerOpen(){ lockerTab=0; lockerPart=0; lockerSnap={}; for(const k of APPEAR_KEYS) lockerSnap[k]=PROFILE[k]; state=S.LOCKER; }
function lockerSave(){ profSave(); state=S.MENU; }
function lockerCancel(){ for(const k of APPEAR_KEYS) PROFILE[k]=lockerSnap[k]; profSave(); state=S.MENU; }
const LK_TAB1={x:20,y:44,w:124,h:32}, LK_TAB2={x:156,y:44,w:124,h:32};
const LK_PARTL={x:18,y:210,w:32,h:32}, LK_PARTR={x:W-50,y:210,w:32,h:32};
const LK_MINUS={x:58,y:256,w:54,h:50}, LK_PLUS={x:W-112,y:256,w:54,h:50};
const LK_CARDY=[122,234,346];
const LK_BUY1={x:W-100,y:154,w:80,h:38}, LK_BUY2={x:W-100,y:266,w:80,h:38}, LK_BUY3={x:W-100,y:378,w:80,h:38};
const LK_SAVE={x:20,y:H-46,w:126,h:38}, LK_CANCEL={x:154,y:H-46,w:126,h:38};
function lkSwatch(i){ return {x:33+(i%6)*40, y:262+((i/6)|0)*42, w:34, h:34}; }
function buyUpgrade(key){ const lv=PROFILE[key]; if(lv>=UP_MAX) return; const c=upCost(lv);
  if(PROFILE.coins>=c){ PROFILE.coins-=c; PROFILE[key]=lv+1; profSave(); SFX.big(); }
  else { SFX.save(); pushToast('NOT ENOUGH COINS','SHOP'); } }
function lockerUpdate(){ let p; while((p=consumeTap())){
  if(hit(p,LK_SAVE)||p.x<0){ SFX.start(); lockerSave(); return; }
  if(hit(p,LK_CANCEL)){ SFX.ui(); lockerCancel(); return; }
  if(hit(p,LK_TAB1)){ lockerTab=0; SFX.ui(); return; }
  if(hit(p,LK_TAB2)){ lockerTab=1; SFX.ui(); return; }
  if(lockerTab===0){
    if(hit(p,LK_PARTL)){ lockerPart=(lockerPart+PARTS.length-1)%PARTS.length; SFX.ui(); return; }
    if(hit(p,LK_PARTR)){ lockerPart=(lockerPart+1)%PARTS.length; SFX.ui(); return; }
    const part=PARTS[lockerPart];
    if(part.key==='initials'){
      for(let i=0;i<3;i++){ if(hit(p,LK_INI[i].up)){ cycleIni(i,1); return; } if(hit(p,LK_INI[i].dn)){ cycleIni(i,-1); return; } }
    } else if(part.key==='num'){
      if(hit(p,LK_MINUS)){ PROFILE.num=(PROFILE.num+99)%100; SFX.ui(); return; }
      if(hit(p,LK_PLUS)){ PROFILE.num=(PROFILE.num+1)%100; SFX.ui(); return; }
    } else {
      for(let i=0;i<PALETTE.length;i++){ if(hit(p,lkSwatch(i))){ PROFILE[part.key]=PALETTE[i]; SFX.ui(); return; } }
    }
  } else {
    if(hit(p,LK_BUY1)){ buyUpgrade('stickLv'); return; }
    if(hit(p,LK_BUY2)){ buyUpgrade('trainLv'); return; }
    if(hit(p,LK_BUY3)){ buyUpgrade('accLv'); return; }
  }
}}
function drawTab(r,label,on){ ctx.fillStyle=on?C.panelHi:C.panel; ctx.fillRect(r.x,r.y,r.w,r.h);
  ctx.fillStyle=on?C.yellow:C.dgrey; ctx.fillRect(r.x,r.y,r.w,3);
  drawText(label,r.x+(r.w-textW(label,1.2))/2,r.y+(r.h-6)/2,1.2,on?C.white:C.cream); }
function drawCard(y0,title,sub,lv,effect,buyR){
  ctx.fillStyle=C.panel; ctx.fillRect(20,y0,W-40,104); ctx.fillStyle=C.dgrey; ctx.fillRect(20,y0,W-40,3);
  drawText(title,30,y0+9,2,C.yellow); drawText('LV '+lv+'/'+UP_MAX,W-148,y0+11,1.1,C.cream);
  drawText(sub,30,y0+32,1.2,C.grey);
  const bw=W-118; ctx.fillStyle='#243049'; ctx.fillRect(30,y0+46,bw,8);
  ctx.fillStyle=C.green; ctx.fillRect(30,y0+46,bw*(lv/UP_MAX),8);
  drawText('NOW '+effect,30,y0+62,1.2,C.cream);
  const maxed=lv>=UP_MAX;
  drawBtn(buyR,false); ctx.fillStyle=maxed?C.gold:C.green; ctx.fillRect(buyR.x,buyR.y,buyR.w,3);
  if(maxed){ drawText('MAXED',buyR.x+(buyR.w-textW('MAXED',1.1))/2,buyR.y+7,1.1,C.gold); }
  else { drawText('UPGRADE',buyR.x+(buyR.w-textW('UPGRADE',1.1))/2,buyR.y+5,1.1,C.white);
         const ct=upCost(lv)+' C'; drawText(ct,buyR.x+(buyR.w-textW(ct,1.1))/2,buyR.y+20,1.1,C.gold); }
}
function drawLocker(){
  vgrad(0,0,W,H,'#10204a','#040814');
  drawTab(LK_TAB1,'GEAR',lockerTab===0); drawTab(LK_TAB2,'UPGRADES',lockerTab===1);
  textC('LEVEL '+curLevel()+'     COINS '+PROFILE.coins,H-66,1.5,C.gold);
  if(lockerTab===0){
    ctx.save(); ctx.translate(W/2,176); ctx.scale(2,2); drawShooter(0,0,false); ctx.restore();
    drawBtn(LK_PARTL,false); glyph('LT',LK_PARTL.x+9,LK_PARTL.y+9,3,C.cream);
    drawBtn(LK_PARTR,false); glyph('GT',LK_PARTR.x+9,LK_PARTR.y+9,3,C.cream);
    const part=PARTS[lockerPart];
    textC(part.label,217,2,C.cream);
    if(part.key==='initials'){
      for(let i=0;i<3;i++){ const c=LK_INI[i];
        drawBtn(c.up,false); glyph('UP',c.up.x+c.up.w/2-7,c.up.y+8,3,C.cream);
        ctx.fillStyle=C.panelHi; ctx.fillRect(c.box.x,c.box.y,c.box.w,c.box.h);
        ctx.fillStyle=C.gold; ctx.fillRect(c.box.x,c.box.y,c.box.w,3); ctx.fillRect(c.box.x,c.box.y+c.box.h-3,c.box.w,3);
        drawText(iniChar(i),c.box.x+c.box.w/2-textW(iniChar(i),4)/2,c.box.y+8,4,C.white);
        drawBtn(c.dn,false); glyph('DN',c.dn.x+c.dn.w/2-7,c.dn.y+8,3,C.cream); }
      textC('USED ON THE LEADERBOARD',H-94,1.2,C.grey);
    } else if(part.key==='num'){
      drawBtn(LK_MINUS,false); drawText('-',LK_MINUS.x+(LK_MINUS.w-textW('-',3))/2,LK_MINUS.y+14,3,C.white);
      const ns=''+PROFILE.num; drawText(ns,W/2-textW(ns,5)/2,262,5,C.yellow);
      drawBtn(LK_PLUS,false); drawText('+',LK_PLUS.x+(LK_PLUS.w-textW('+',3))/2,LK_PLUS.y+14,3,C.white);
    } else {
      for(let i=0;i<PALETTE.length;i++){ const r=lkSwatch(i), on=(PROFILE[part.key]===PALETTE[i]);
        ctx.fillStyle=PALETTE[i]; ctx.fillRect(r.x,r.y,r.w,r.h);
        ctx.strokeStyle=on?C.white:'rgba(0,0,0,0.4)'; ctx.lineWidth=on?3:1; ctx.strokeRect(r.x+0.5,r.y+0.5,r.w-1,r.h-1); }
    }
  } else {
    drawCard(LK_CARDY[0],'STICK','SHOOT FASTER',PROFILE.stickLv,'+'+(3*PROFILE.stickLv)+'% SPEED',LK_BUY1);
    drawCard(LK_CARDY[1],'TRAINING','MOVE & AIM FASTER',PROFILE.trainLv,'+'+(4*PROFILE.trainLv)+'% SPEED',LK_BUY2);
    drawCard(LK_CARDY[2],'ACCURACY','TIGHTER SHOTS',PROFILE.accLv,'+'+Math.round(PROFILE.accLv*4)+'% AIM',LK_BUY3);
  }
  drawBtn(LK_SAVE,false); ctx.fillStyle=C.green; ctx.fillRect(LK_SAVE.x,LK_SAVE.y,LK_SAVE.w,3);
  drawText('SAVE',LK_SAVE.x+(LK_SAVE.w-textW('SAVE',2))/2,LK_SAVE.y+13,2,C.white);
  drawBtn(LK_CANCEL,false); ctx.fillStyle=C.red; ctx.fillRect(LK_CANCEL.x,LK_CANCEL.y,LK_CANCEL.w,3);
  drawText('BACK',LK_CANCEL.x+(LK_CANCEL.w-textW('BACK',2))/2,LK_CANCEL.y+13,2,C.cream);
}

// ====================== MAIN LOOP (crash-safe) ======================
function frameStep(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H); tctx.clearRect(0,0,W,H); shareBtn=null;
  if(state===S.WELCOME){ welcomeUpdate(); drawWelcome(); }
  else if(state===S.TRIVIA){ triviaUpdate(); drawTrivia(); }
  else if(state===S.MENU){ menuUpdate(); drawMenu(); }
  else if(state===S.HELP){ helpUpdate(); drawHelp(); }
  else if(state===S.LOCKER){ lockerUpdate(); drawLocker(); }
  else if(state===S.G1){ g1Update(); g1Draw(); }
  else if(state===S.OVER){ overUpdate(); drawOver(); }
  else if(state===S.SURVEY){ surveyUpdate(); drawSurvey(); }
  else if(state===S.ENTRY){ entryUpdate(); drawEntry(); }
  else if(state===S.LB){ lbUpdate(); drawLeaderboard(); }
  else if(state===S.BADGES){ badgesUpdate(); drawBadges(); }
  drawToasts();
  ctx.globalAlpha=0.05; ctx.fillStyle='#000'; for(let y=0;y<H;y+=3) ctx.fillRect(0,y,W,1); ctx.globalAlpha=1;
}
let lastErr='';
function loop(){
  frame++;
  try{ frameStep(); }
  catch(e){
    // never freeze on a blank screen — show the error and let the user tap back to menu
    lastErr=(''+(e&&e.message||e)).slice(0,40);
    ctx.fillStyle='#101626'; ctx.fillRect(0,0,W,H);
    textCS('OOPS',120,4,C.red,C.black);
    textC('SOMETHING GLITCHED',170,1,C.cream);
    textC(lastErr||'UNKNOWN',192,1,C.grey);
    textC('TAP TO RETURN TO MENU',240,1,C.yellow);
    if(consumeTap()){ state=S.MENU; menuSel=0; }
  }
  pressQueue.length=0;
  requestAnimationFrame(loop);
}
loop();

})();
