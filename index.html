<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>LAX TAPPER</title>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  html,body { margin:0; padding:0; height:100%; background:#05070f; overflow:hidden; font-family:'Courier New',monospace; touch-action:none; }
  #wrap { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
  canvas { image-rendering:pixelated; image-rendering:crisp-edges; background:#000; box-shadow:0 0 0 3px #141a30, 0 0 50px #000; cursor:pointer; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c" width="300" height="540"></canvas></div>
<script>
(function(){
"use strict";

// ====================== SETUP ======================
const W=300, H=540;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;
function resize(){
  const aw=window.innerWidth, ah=window.innerHeight;
  const s=Math.min(aw/W, ah/H);
  canvas.style.width=Math.round(W*s)+'px';
  canvas.style.height=Math.round(H*s)+'px';
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,100));
resize();

// ====================== PALETTE ======================
const C={
  skyTop:'#3a6ea5',skyBot:'#9ed0ee',
  grass1:'#2f9e44',grass2:'#268c3a',grass3:'#1f7a31',
  orange:'#ff8a1e',orangeHi:'#ffb347',orangeDk:'#c75a00',
  mesh:'rgba(255,255,255,0.30)',
  gk:'#e23b4e',gkHi:'#ff6276',gkDk:'#8d1f2c',pad:'#f0f2ff',
  skin:'#ffce9e',jersey:'#15151c',jerseyHi:'#34343f',num:'#ffffff',
  helmet:'#f4f6ff',helmetSh:'#c3c8da',shaft:'#d7d9e0',crosse:'#b9a7d6',
  ball:'#fff7ea',ballSh:'#d9c9a8',
  white:'#ffffff',cream:'#ffe9c2',yellow:'#ffd23f',gold:'#ffb000',
  red:'#ff3b56',green:'#3fe06a',blue:'#43b4ff',grey:'#8b93a7',
  dgrey:'#3a4256',black:'#0a0c12',panel:'#101626',panelHi:'#1d2740',btn:'#243154',btnA:'#3c63b0'
};

// ====================== FONT ======================
const FONT={
 'A':["01110","10001","11111","10001","10001"],'B':["11110","10001","11110","10001","11110"],
 'C':["01111","10000","10000","10000","01111"],'D':["11110","10001","10001","10001","11110"],
 'E':["11111","10000","11110","10000","11111"],'F':["11111","10000","11110","10000","10000"],
 'G':["01111","10000","10011","10001","01111"],'H':["10001","10001","11111","10001","10001"],
 'I':["11111","00100","00100","00100","11111"],'J':["00111","00010","00010","10010","01100"],
 'K':["10001","10010","11100","10010","10001"],'L':["10000","10000","10000","10000","11111"],
 'M':["10001","11011","10101","10001","10001"],'N':["10001","11001","10101","10011","10001"],
 'O':["01110","10001","10001","10001","01110"],'P':["11110","10001","11110","10000","10000"],
 'Q':["01110","10001","10101","10010","01101"],'R':["11110","10001","11110","10010","10001"],
 'S':["01111","10000","01110","00001","11110"],'T':["11111","00100","00100","00100","00100"],
 'U':["10001","10001","10001","10001","01110"],'V':["10001","10001","10001","01010","00100"],
 'W':["10001","10001","10101","11011","10001"],'X':["10001","01010","00100","01010","10001"],
 'Y':["10001","01010","00100","00100","00100"],'Z':["11111","00010","00100","01000","11111"],
 '0':["01110","10011","10101","11001","01110"],'1':["00100","01100","00100","00100","01110"],
 '2':["11110","00001","01110","10000","11111"],'3':["11110","00001","01110","00001","11110"],
 '4':["10010","10010","11111","00010","00010"],'5':["11111","10000","11110","00001","11110"],
 '6':["01111","10000","11110","10001","01110"],'7':["11111","00010","00100","01000","01000"],
 '8':["01110","10001","01110","10001","01110"],'9':["01110","10001","01111","00001","11110"],
 '!':["00100","00100","00100","00000","00100"],'?':["01110","10001","00110","00000","00100"],
 ':':["00000","00100","00000","00100","00000"],'.':["00000","00000","00000","00000","00100"],
 '-':["00000","00000","11111","00000","00000"],'+':["00000","00100","01110","00100","00000"],
 '/':["00001","00010","00100","01000","10000"],'L4':[],
 'LT':["00010","00100","01000","00100","00010"],'GT':["01000","00100","00010","00100","01000"],
 'UP':["00100","01110","10101","00100","00100"],'DN':["00100","00100","10101","01110","00100"],
 ' ':["00000","00000","00000","00000","00000"]
};
function drawText(str,x,y,s,col){ s=s||1; ctx.fillStyle=col||C.white; let cx=x;
  for(const ch of (''+str)){ const g=FONT[ch]||FONT[(''+ch).toUpperCase()]||FONT['?'];
    for(let r=0;r<5;r++){ const row=g[r]; if(!row) continue; for(let i=0;i<5;i++) if(row[i]==='1') ctx.fillRect(cx+i*s,y+r*s,s,s); }
    cx+=6*s; } return cx; }
function textW(str,s){ return (''+str).length*6*s - s; }
function textC(str,y,s,col){ drawText(str,(W-textW(str,s))/2,y,s,col); }
function textS(str,x,y,s,col,sh){ drawText(str,x+s,y+s,s,sh||C.black); drawText(str,x,y,s,col); }
function textCS(str,y,s,col,sh){ textS(str,(W-textW(str,s))/2,y,s,col,sh); }
// glyph helpers for arrow icons (size in px)
function glyph(name,x,y,s,col){ ctx.fillStyle=col||C.white; const g=FONT[name]; for(let r=0;r<5;r++)for(let i=0;i<5;i++) if(g[r][i]==='1') ctx.fillRect(x+i*s,y+r*s,s,s); }

// ====================== INPUT ======================
let pressQueue=[];
let pointers={};
let keys={moveL:false,moveR:false,aimL:false,aimR:false,aimU:false,aimD:false};
let spaceDown=false;
// twin virtual joysticks (bottom corners)
const LJOY={cx:64,cy:470,r:48,k:24};
const RJOY={cx:W-64,cy:470,r:48,k:24};
let sL={id:null,dx:0,dy:0};
let sR={id:null,dx:0,dy:0};
let rReleased=false;           // edge flag: right stick was just let go
function inJoy(j,x,y){ return Math.hypot(x-j.cx,y-j.cy)<=j.r+28; }
function setJoy(j,s,x,y){ s.dx=clamp((x-j.cx)/j.r,-1,1); s.dy=clamp((y-j.cy)/j.r,-1,1); }
function resetSticks(){ sL.id=null; sL.dx=0; sL.dy=0; sR.id=null; sR.dx=0; sR.dy=0; rReleased=false; }
function pt(clientX,clientY){ const r=canvas.getBoundingClientRect(); return {x:(clientX-r.left)/(r.width/W), y:(clientY-r.top)/(r.height/H)}; }
function down(id,x,y){
  unlockAudio(); pointers[id]={x,y}; pressQueue.push({x,y});
  if(sL.id===null && inJoy(LJOY,x,y)){ sL.id=id; setJoy(LJOY,sL,x,y); }
  else if(sR.id===null && inJoy(RJOY,x,y)){ sR.id=id; setJoy(RJOY,sR,x,y); }
}
function move(id,x,y){
  if(pointers[id]) pointers[id]={x,y};
  if(id===sL.id) setJoy(LJOY,sL,x,y);
  if(id===sR.id) setJoy(RJOY,sR,x,y);
}
function up(id){
  delete pointers[id];
  if(id===sL.id){ sL.id=null; sL.dx=0; sL.dy=0; }
  if(id===sR.id){ sR.id=null; rReleased=true; }   // keep dx,dy so the game can shoot where it pointed
}
canvas.addEventListener('mousedown',e=>{ e.preventDefault(); const p=pt(e.clientX,e.clientY); down('m',p.x,p.y); });
window.addEventListener('mousemove',e=>{ if(pointers['m']){ const p=pt(e.clientX,e.clientY); move('m',p.x,p.y); } });
window.addEventListener('mouseup',()=>up('m'));
canvas.addEventListener('touchstart',e=>{ e.preventDefault(); for(const t of e.changedTouches){ const p=pt(t.clientX,t.clientY); down(t.identifier,p.x,p.y); } },{passive:false});
canvas.addEventListener('touchmove',e=>{ e.preventDefault(); for(const t of e.changedTouches){ const p=pt(t.clientX,t.clientY); move(t.identifier,p.x,p.y); } },{passive:false});
canvas.addEventListener('touchend',e=>{ e.preventDefault(); for(const t of e.changedTouches) up(t.identifier); },{passive:false});
canvas.addEventListener('touchcancel',e=>{ for(const t of e.changedTouches) up(t.identifier); });
canvas.addEventListener('dblclick',e=>e.preventDefault());
canvas.addEventListener('gesturestart',e=>e.preventDefault());
window.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='Enter'){ e.preventDefault(); if(!spaceDown){ pressQueue.push({x:-1,y:-1}); spaceDown=true; } }
  if(e.code==='KeyA') keys.moveL=true; if(e.code==='KeyD') keys.moveR=true;
  if(e.code==='ArrowLeft') keys.aimL=true; if(e.code==='ArrowRight') keys.aimR=true;
  if(e.code==='ArrowUp') keys.aimU=true; if(e.code==='ArrowDown') keys.aimD=true;
});
window.addEventListener('keyup',e=>{
  if(e.code==='Space'||e.code==='Enter') spaceDown=false;
  if(e.code==='KeyA') keys.moveL=false; if(e.code==='KeyD') keys.moveR=false;
  if(e.code==='ArrowLeft') keys.aimL=false; if(e.code==='ArrowRight') keys.aimR=false;
  if(e.code==='ArrowUp') keys.aimU=false; if(e.code==='ArrowDown') keys.aimD=false;
});
function consumeTap(){ return pressQueue.length?pressQueue.shift():null; }
function hit(p,r){ return p && p.x>=r.x && p.x<=r.x+r.w && p.y>=r.y && p.y<=r.y+r.h; }
function held(r){ for(const id in pointers){ const q=pointers[id]; if(q.x>=r.x&&q.x<=r.x+r.w&&q.y>=r.y&&q.y<=r.y+r.h) return true; } return false; }

// ====================== SOUND ======================
let actx=null;
function ac(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return actx; }
function unlockAudio(){ const a=ac(); if(a&&a.state==='suspended') a.resume(); }
function beep(f,d,t,v){ const a=ac(); if(!a) return; try{ const o=a.createOscillator(),g=a.createGain();
  o.type=t||'square'; o.frequency.value=f; g.gain.value=v||0.05; o.connect(g); g.connect(a.destination);
  const n=a.currentTime; o.start(n); g.gain.setValueAtTime(g.gain.value,n); g.gain.exponentialRampToValueAtTime(0.0001,n+(d||0.1)); o.stop(n+(d||0.1)); }catch(e){} }
const SFX={
  shoot:()=>{ beep(720,0.06,'square',0.05); setTimeout(()=>beep(420,0.05),40); },
  goal:()=>{ beep(523,0.08); setTimeout(()=>beep(659,0.08),80); setTimeout(()=>beep(880,0.16),160); },
  save:()=>beep(120,0.22,'sawtooth',0.06),
  wide:()=>beep(180,0.16,'sine',0.05),
  big:()=>{ beep(660,0.07); setTimeout(()=>beep(880,0.07),70); setTimeout(()=>beep(1175,0.16),140); },
  ui:()=>beep(840,0.05,'square',0.05),
  start:()=>{ beep(523,0.07); setTimeout(()=>beep(784,0.12),80); }
};

// ====================== HELPERS ======================
function rnd(a,b){ return a+Math.random()*(b-a); }
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function lerp(a,b,t){ return a+(b-a)*t; }
function dist(ax,ay,bx,by){ return Math.hypot(ax-bx,ay-by); }
function vgrad(x,y,w,h,c1,c2){ const g=ctx.createLinearGradient(x,y,x,y+h); g.addColorStop(0,c1); g.addColorStop(1,c2); ctx.fillStyle=g; ctx.fillRect(x,y,w,h); }
const HI={g1:0};
try{ HI.g1=+localStorage.getItem('lax4_hi1')||0; }catch(e){}
function saveHi(){ try{ localStorage.setItem('lax4_hi1',HI.g1); }catch(e){} }
let parts=[];
function spawn(x,y,n,cols,sp){ sp=sp||2.6; for(let i=0;i<n;i++) parts.push({x,y,vx:rnd(-sp,sp),vy:rnd(-sp*1.3,-0.3),life:rnd(24,46),c:cols[(Math.random()*cols.length)|0]}); }
function updateParts(){ for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.14; p.life--; if(p.life<=0) parts.splice(i,1); } }
function drawParts(){ for(const p of parts){ ctx.fillStyle=p.c; const s=p.life>14?2:1; ctx.fillRect(p.x|0,p.y|0,s+1,s+1); } }

// ====================== SPRITES ======================
function drawBall(x,y,r){ r=r||4;
  ctx.fillStyle=C.ballSh; ctx.beginPath(); ctx.arc(x,y+1,r,0,7); ctx.fill();
  ctx.fillStyle=C.ball; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.fillRect(x-r+1,y-r+1,2,2);
}
function drawShooter(x,y,wind){
  ctx.fillStyle=C.jersey; ctx.fillRect(x-6,y,5,14); ctx.fillRect(x+2,y,5,14);
  ctx.fillStyle=C.black; ctx.fillRect(x-7,y+13,7,3); ctx.fillRect(x+1,y+13,7,3);
  ctx.fillStyle=C.jersey; ctx.fillRect(x-9,y-16,18,18);
  ctx.fillStyle=C.jerseyHi; ctx.fillRect(x-9,y-16,18,3);
  drawText('15',x-6,y-11,1,C.num);
  ctx.fillStyle=C.skin; ctx.fillRect(x-4,y-25,8,9);
  ctx.fillStyle=C.helmet; ctx.fillRect(x-6,y-27,12,8);
  ctx.fillStyle=C.helmetSh; ctx.fillRect(x-6,y-21,12,2);
  ctx.fillStyle=C.dgrey; ctx.fillRect(x+3,y-22,3,4);
  const sw=wind?4:0;
  ctx.strokeStyle=C.skin; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(x+6,y-12); ctx.lineTo(x+13+sw,y-20); ctx.stroke();
  ctx.strokeStyle=C.shaft; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(x+13+sw,y-20); ctx.lineTo(x+24+sw,y-42); ctx.stroke();
  ctx.fillStyle=C.orange; ctx.fillRect(x+22+sw,y-50,8,8); ctx.fillStyle=C.crosse; ctx.fillRect(x+23+sw,y-49,6,6);
}
function drawGoalie(x,baseY,bw,bh,lunge,fh,fhOpen){
  const top=baseY-bh, upperH=Math.round(bh*0.52), legTop=top+upperH, gap=18, legW=(bw-gap)/2;
  // chest / upper body (solid, covers high)
  ctx.fillStyle=C.gkDk; ctx.fillRect(x-bw/2, top, bw, upperH+4);
  ctx.fillStyle=C.gk;   ctx.fillRect(x-bw/2, top, bw, upperH);
  ctx.fillStyle=C.gkHi; ctx.fillRect(x-bw/2, top, bw, 4);
  ctx.fillStyle=C.pad;  ctx.fillRect(x-bw/2+5, top+12, bw-10, 20);
  ctx.fillStyle=C.gkDk; ctx.fillRect(x-3, top+12, 6, 20);
  // shoulders / arms
  ctx.fillStyle=C.gk; ctx.fillRect(x-bw/2-6, top+6, 7, 22); ctx.fillRect(x+bw/2-1, top+6, 7, 22);
  ctx.fillStyle=C.gkDk; ctx.fillRect(x-bw/2-6, top+24, 7, 4); ctx.fillRect(x+bw/2-1, top+24, 7, 4);
  // two leg pads; the gap between them is the five hole (filled in when shut)
  ctx.fillStyle=C.gkDk; ctx.fillRect(x-bw/2, legTop, legW, baseY-legTop); ctx.fillRect(x+gap/2, legTop, legW, baseY-legTop);
  ctx.fillStyle=C.gk;   ctx.fillRect(x-bw/2, legTop, legW-3, baseY-legTop); ctx.fillRect(x+gap/2+3, legTop, legW-3, baseY-legTop);
  if(!fhOpen){ ctx.fillStyle=C.gkDk; ctx.fillRect(x-gap/2, legTop, gap, baseY-legTop); ctx.fillStyle=C.gk; ctx.fillRect(x-gap/2+1, legTop, gap-2, baseY-legTop); }
  // head + helmet
  ctx.fillStyle=C.skin; ctx.fillRect(x-6, top-13, 12, 12);
  ctx.fillStyle=C.helmet; ctx.fillRect(x-8, top-16, 16, 10);
  ctx.fillStyle=C.helmetSh; ctx.fillRect(x-8, top-7, 16, 2);
  ctx.fillStyle=C.dgrey; ctx.fillRect(x-8, top-12, 3, 6);
  // crosse raised HIGH overhead (covers the top of the net)
  const lx=lunge||0;
  ctx.strokeStyle=C.shaft; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(x+bw/2, top+6); ctx.lineTo(x+lx, top-30); ctx.stroke();
  ctx.fillStyle=C.orange; ctx.fillRect(x-7+lx, top-40, 14, 12); ctx.fillStyle=C.crosse; ctx.fillRect(x-6+lx, top-39, 12, 10);
  // the five hole: open = dark gap with green ring; shut = faint red hint
  if(fh){
    if(fhOpen){ ctx.fillStyle='#0c1a10'; ctx.beginPath(); ctx.arc(fh.x,fh.y,fh.r,0,7); ctx.fill();
      ctx.strokeStyle='rgba(120,235,150,0.8)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(fh.x,fh.y,fh.r,0,7); ctx.stroke(); }
    else { ctx.strokeStyle='rgba(255,70,90,0.30)'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(fh.x,fh.y,fh.r,0,7); ctx.stroke(); }
  }
}
function drawBackstop(r){
  ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=1;
  for(let i=r.x-30;i<r.x+r.w+30;i+=9){ ctx.beginPath(); ctx.moveTo(i,r.y-26); ctx.lineTo(i,r.y+r.h+8); ctx.stroke(); }
  for(let j=r.y-26;j<r.y+r.h+8;j+=9){ ctx.beginPath(); ctx.moveTo(r.x-30,j); ctx.lineTo(r.x+r.w+30,j); ctx.stroke(); }
}
function drawGoalFrame(r){
  ctx.fillStyle=C.orangeDk; ctx.fillRect(r.x-12,r.y-30,10,r.h+40); ctx.fillRect(r.x+r.w+2,r.y-30,10,r.h+40);
  ctx.fillStyle=C.orange; ctx.fillRect(r.x-12,r.y-30,10,r.h+40); ctx.fillRect(r.x+r.w+2,r.y-30,10,r.h+40);
  ctx.fillStyle=C.orange; ctx.fillRect(r.x-12,r.y-30,r.w+24,10); ctx.fillStyle=C.orangeHi; ctx.fillRect(r.x-12,r.y-30,r.w+24,3);
  ctx.fillStyle=C.orangeDk; ctx.fillRect(r.x-5,r.y-5,r.w+10,r.h+10);
  ctx.fillStyle=C.orange; ctx.fillRect(r.x-3,r.y-3,r.w+6,r.h+6);
  ctx.fillStyle=C.orangeHi; ctx.fillRect(r.x-3,r.y-3,r.w+6,3);
}
function drawMesh(r){
  ctx.fillStyle='#0c1a10'; ctx.fillRect(r.x,r.y,r.w,r.h);
  ctx.strokeStyle=C.mesh; ctx.lineWidth=1;
  for(let i=r.x+5;i<r.x+r.w;i+=8){ ctx.beginPath(); ctx.moveTo(i,r.y); ctx.lineTo(i,r.y+r.h); ctx.stroke(); }
  for(let j=r.y+5;j<r.y+r.h;j+=8){ ctx.beginPath(); ctx.moveTo(r.x,j); ctx.lineTo(r.x+r.w,j); ctx.stroke(); }
}
function drawBtn(r,active){
  ctx.fillStyle=active?C.btnA:C.btn; ctx.fillRect(r.x,r.y,r.w,r.h);
  ctx.fillStyle=active?C.white:C.dgrey; ctx.fillRect(r.x,r.y,r.w,3);
  ctx.fillRect(r.x,r.y,3,r.h); ctx.fillRect(r.x+r.w-3,r.y,3,r.h); ctx.fillRect(r.x,r.y+r.h-3,r.w,3);
}
// virtual joystick: base ring + knob offset by stick vector
function drawJoy(j,s,label,active,accent){
  ctx.fillStyle='rgba(16,22,38,0.82)'; ctx.beginPath(); ctx.arc(j.cx,j.cy,j.r,0,7); ctx.fill();
  ctx.strokeStyle=active?(accent||C.yellow):C.dgrey; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(j.cx,j.cy,j.r,0,7); ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.10)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(j.cx-j.r+6,j.cy); ctx.lineTo(j.cx+j.r-6,j.cy); ctx.moveTo(j.cx,j.cy-j.r+6); ctx.lineTo(j.cx,j.cy+j.r-6); ctx.stroke();
  const kx=j.cx+s.dx*(j.r-j.k), ky=j.cy+s.dy*(j.r-j.k);
  ctx.fillStyle=active?C.btnA:C.btn; ctx.beginPath(); ctx.arc(kx,ky,j.k,0,7); ctx.fill();
  ctx.fillStyle=active?C.white:C.grey; ctx.beginPath(); ctx.arc(kx,ky,j.k-6,0,7); ctx.fill();
  drawText(label, j.cx-textW(label,1)/2, j.cy+j.r+7, 1, active?C.cream:C.grey);
}

// ====================== STATE ======================
const S={MENU:0,HELP:1,G1:2,OVER:3};
let state=S.MENU, frame=0, menuSel=0;

// ====================== MENU ======================
const MENU_BTNS=[
  {label:'PLAY GOALIE', sub:'BEAT THE KEEPER',   go:()=>{ g1Init(); state=S.G1; }},
  {label:'HOW TO PLAY', sub:'CONTROLS & RULES',  go:()=>{ helpPage=0; state=S.HELP; }}
];
function btnRect(i){ return {x:24,y:320+i*70,w:W-48,h:56}; }
function menuUpdate(){
  let p; while((p=consumeTap())){
    if(p.x<0){ MENU_BTNS[menuSel].go(); SFX.start(); return; }
    for(let i=0;i<MENU_BTNS.length;i++){ if(hit(p,btnRect(i))){ menuSel=i; SFX.start(); MENU_BTNS[i].go(); return; } }
  }
  if(keys.aimU){ menuSel=(menuSel+1)%2; keys.aimU=false; }
  if(keys.aimD){ menuSel=(menuSel+1)%2; keys.aimD=false; }
}
function drawMenu(){
  vgrad(0,0,W,H,C.skyTop,C.skyBot);
  ctx.fillStyle=C.grass1; ctx.fillRect(0,H*0.5,W,H*0.5);
  for(let i=0;i<6;i++){ ctx.fillStyle=i%2?C.grass2:C.grass3; ctx.fillRect(0,H*0.5+i*22,W,11); }
  ctx.fillStyle=C.panel; ctx.fillRect(20,46,W-40,120);
  ctx.fillStyle=C.gold; ctx.fillRect(20,46,W-40,6); ctx.fillRect(20,160,W-40,6);
  textCS('LACROSSE',70,5,C.yellow,C.orangeDk);
  textCS('TAPPER',110,7,C.orange,C.black);
  textCS('- GOALIE SHOOTOUT -',146,1,C.cream,C.black);
  const by=232+Math.sin(frame*0.12)*8;
  ctx.strokeStyle=C.shaft; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(W/2+18,by+14); ctx.lineTo(W/2+4,by); ctx.stroke();
  ctx.fillStyle=C.orange; ctx.fillRect(W/2-2,by-8,10,10); ctx.fillStyle=C.crosse; ctx.fillRect(W/2-1,by-7,8,8);
  drawBall(W/2-6,by-3,5);
  for(let i=0;i<MENU_BTNS.length;i++){
    const b=btnRect(i), sel=(i===menuSel);
    ctx.fillStyle=sel?C.panelHi:C.panel; ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.fillStyle=sel?C.yellow:C.dgrey; ctx.fillRect(b.x,b.y,b.w,3); ctx.fillRect(b.x,b.y+b.h-3,b.w,3); ctx.fillRect(b.x,b.y,3,b.h); ctx.fillRect(b.x+b.w-3,b.y,3,b.h);
    drawText(MENU_BTNS[i].label,b.x+(b.w-textW(MENU_BTNS[i].label,2))/2,b.y+12,2,sel?C.white:C.cream);
    drawText(MENU_BTNS[i].sub,b.x+(b.w-textW(MENU_BTNS[i].sub,1))/2,b.y+36,1,sel?C.green:C.grey);
  }
  drawText('BEST '+HI.g1, (W-textW('BEST '+HI.g1,1))/2, 300, 1, C.gold);
  textCS('TAP TO START',H-22,1,C.cream,C.black);
}

// ====================== HELP ======================
let helpPage=0;
const HELP=[
  {title:'HOW TO PLAY',lines:['SCORE ON A LIVE GOALIE.','HE BLOCKS THE NET WITH','HIS BODY (THE DARK ZONE).','','TWO THUMB-STICKS DOWN','IN THE BOTTOM CORNERS.','','TAP THROUGH FOR CONTROLS.']},
  {title:'CONTROLS',lines:['LEFT STICK = MOVE YOUR','PLAYER. THIS SWINGS THE','ANGLE - THE KEEPER SLIDES','TO FOLLOW YOU.','','RIGHT STICK = AIM THE','SHOT. LIFT YOUR THUMB','OFF TO FIRE THE BALL.','','(DESKTOP: A/D MOVE,','ARROWS AIM, SPACE SHOOT)']},
  {title:'SCORING',lines:['RETICLE GREEN = OPEN,','RED = COVERED, GREY =','OFF THE NET (YOU CAN MISS).','','THE FIVE HOLE OPENS AND','SHUTS - SHOOT IT WHILE THE','GREEN RING IS SHOWING.','','TOP CORNER = 5   LOW = 4','FAR SIDE = 3   FIVE HOLE = 5','10 SHOTS - HE GETS TOUGHER.']}
];
function helpUpdate(){ let p; while((p=consumeTap())){ if(hit(p,{x:12,y:12,w:80,h:36})){ SFX.ui(); state=S.MENU; return; } helpPage++; SFX.ui(); if(helpPage>=HELP.length){ state=S.MENU; return; } } }
function drawHelp(){
  vgrad(0,0,W,H,'#10204a','#040814');
  ctx.fillStyle=C.panelHi; ctx.fillRect(12,12,80,36); ctx.fillStyle=C.dgrey; ctx.fillRect(12,12,80,3);
  glyph('LT',20,22,3,C.cream); drawText('BACK',36,23,2,C.cream);
  const pg=HELP[clamp(helpPage,0,HELP.length-1)];
  textCS(pg.title,72,3,C.yellow,C.black);
  let y=128; for(const ln of pg.lines){ const hl=ln.indexOf('=')>=0||ln.indexOf('GREEN')>=0||ln.indexOf('DRAG')>=0; textC(ln,y,1,hl?C.green:C.cream); y+=18; }
  for(let i=0;i<HELP.length;i++){ ctx.fillStyle=i===helpPage?C.yellow:C.dgrey; ctx.fillRect(W/2-HELP.length*7+i*14,H-56,9,9); }
  textCS(helpPage<HELP.length-1?'TAP TO CONTINUE':'TAP TO FINISH',H-34,1,C.white,C.black);
}

// ====================== GAME — GOALIE (twin-stick) ======================
const G1={};
const NET1={x:60,y:64,w:180,h:150};
const AIM_CX=NET1.x+NET1.w/2, AIM_CY=NET1.y+NET1.h/2;
const AIM_EX=NET1.w/2+22, AIM_EY=NET1.h/2+20;   // reaches past the posts so you can miss
const AIM_MINX=NET1.x-26, AIM_MAXX=NET1.x+NET1.w+26;
const AIM_MINY=NET1.y-26, AIM_MAXY=NET1.y+NET1.h+30;
const FH_OPEN=80, FH_SHUT=170;                  // five hole: ~1.3s open, ~2.8s shut
function g1Init(){
  G1.shots=10; G1.score=0; G1.goals=0;
  G1.aimX=AIM_CX; G1.aimY=AIM_CY;
  G1.gk={x:AIM_CX,idealX:AIM_CX,bw:64,bh:134,reach:16,lunge:0};
  G1.phase='aim'; G1.ball=null; G1.shake=0;
  G1.msg=''; G1.msgT=0; G1.msgC=C.white; G1.tut=true;
  G1.shooterX=W/2; G1.shooterY=330;
  G1.fhT=(Math.random()*(FH_OPEN+FH_SHUT))|0; G1.fhOpen=false;
  resetSticks();
}
// the gap between the goalie's legs (five hole)
function g1FiveHole(gk){ return {x:gk.x, y:(NET1.y+NET1.h)-gk.bh*0.20, r:13}; }
function g1Covered(tx,ty,gk){
  // his body+stick cover his whole vertical column (top to bottom)...
  if(Math.abs(tx-gk.x) >= gk.bw/2+gk.reach) return false;   // around him = open
  const fh=g1FiveHole(gk);
  if(G1.fhOpen && dist(tx,ty,fh.x,fh.y) < fh.r) return false; // ...except through the legs WHEN OPEN
  return true;
}
function g1NextShot(){ if(G1.shots<=0){ endGame(G1.score); return; } G1.phase='aim'; G1.ball=null; }
function g1Fire(){
  const sx=G1.shooterX, sy=G1.shooterY-44, tx=G1.aimX, ty=G1.aimY, d=dist(sx,sy,tx,ty)||1, spd=9.5;
  G1.ball={x:sx,y:sy,vx:(tx-sx)/d*spd,vy:(ty-sy)/d*spd,tx,ty,t:0,total:Math.max(8,d/spd)};
  G1.phase='fly'; G1.shots--; G1.gk.lunge=0; sR.dx=0; sR.dy=0; SFX.shoot();
}
function g1Update(){
  if(G1.msgT>0) G1.msgT--; G1.shake*=0.82;
  // difficulty ramps gently across the 10 shots (0 at shot 1 -> 1 at shot 10)
  const d=clamp((10-G1.shots)/9,0,1);
  G1.gk.reach=14+d*9;                                  // wider coverage later
  const openLen=Math.round(FH_OPEN-d*34);              // five hole window 80 -> 46 frames
  G1.fhT=(G1.fhT+1)%(openLen+FH_SHUT); G1.fhOpen=G1.fhT<openLen;
  if(G1.tut){ if(consumeTap()){ G1.tut=false; resetSticks(); } rReleased=false; return; }
  const gk=G1.gk, mn=NET1.x+gk.bw/2+2, mx=NET1.x+NET1.w-gk.bw/2-2;
  // LEFT STICK / A-D: move the attacker (this swings the shot angle)
  const moveDx = sL.dx + (keys.moveR?1:0) - (keys.moveL?1:0);
  G1.shooterX = clamp(G1.shooterX + moveDx*2.8, 74, W-74);
  // goalie plays the angle: slides toward the side the shooter is on (sharper later)
  gk.idealX = clamp(AIM_CX + (G1.shooterX - W/2)*(0.5+d*0.22), mn, mx);

  if(G1.phase==='aim'){
    gk.x += (gk.idealX-gk.x)*(0.06+d*0.06) + Math.sin(frame*0.05)*(0.4+d*0.6); gk.x=clamp(gk.x,mn,mx);
    // RIGHT STICK aims; release to shoot
    if(sR.id!==null){
      G1.aimX = clamp(AIM_CX + sR.dx*AIM_EX, AIM_MINX, AIM_MAXX);
      G1.aimY = clamp(AIM_CY + sR.dy*AIM_EY, AIM_MINY, AIM_MAXY);
    } else if(keys.aimL||keys.aimR||keys.aimU||keys.aimD){
      G1.aimX = clamp(G1.aimX + ((keys.aimR?1:0)-(keys.aimL?1:0))*3.4, AIM_MINX, AIM_MAXX);
      G1.aimY = clamp(G1.aimY + ((keys.aimD?1:0)-(keys.aimU?1:0))*3.4, AIM_MINY, AIM_MAXY);
    }
    let fire=rReleased;
    let p; while((p=consumeTap())){ if(p.x<0) fire=true; }   // space = shoot; drain the rest
    if(fire) g1Fire();
  } else if(G1.phase==='fly'){
    const b=G1.ball; b.x+=b.vx; b.y+=b.vy; b.t++;
    const lc=2.3+d*1.8; const dx=b.tx-gk.x; gk.x=clamp(gk.x+clamp(dx,-lc,lc),mn,mx); gk.lunge=clamp(dx*0.4,-6,6);
    if(b.t>=b.total){
      b.x=b.tx; b.y=b.ty;
      const inNet = b.tx>NET1.x && b.tx<NET1.x+NET1.w && b.ty>NET1.y && b.ty<NET1.y+NET1.h;
      if(!inNet){
        G1.msg='MISSED!'; G1.msgC=C.grey; G1.msgT=64; SFX.wide();
        b.bounce=true;   // sails on past the net
      } else if(g1Covered(b.tx,b.ty,gk)){
        G1.msg='SAVE!'; G1.msgC=C.red; G1.msgT=64; G1.shake=6; SFX.save();
        b.vx=-b.vx*0.3; b.vy=2.6; b.bounce=true;
      } else {
        const fh=g1FiveHole(gk), five=dist(b.tx,b.ty,fh.x,fh.y)<fh.r;
        const vy=(b.ty-NET1.y)/NET1.h, top=vy<0.34, low=vy>0.66;
        let pts,label;
        if(five){ pts=5; label='FIVE HOLE!'; }
        else if(top){ pts=5; label='TOP CORNER!'; }
        else if(low){ pts=4; label='LOW CORNER!'; }
        else { pts=3; label='FAR SIDE!'; }
        G1.score+=pts; G1.goals++;
        G1.msg=label+' +'+pts; G1.msgC=five?C.gold:C.green; G1.msgT=72;
        spawn(b.x,b.y,five?28:20,five?[C.gold,C.yellow,C.white]:[C.green,C.yellow,C.white]);
        (pts>=5)?SFX.big():SFX.goal(); b.dead=true;
      }
      G1.phase='result'; G1.resT=42;
    }
  } else if(G1.phase==='result'){
    const b=G1.ball; if(b&&b.bounce){ b.x+=b.vx; b.y+=b.vy; b.vy+=0.3; }
    if(--G1.resT<=0) g1NextShot();
  }
  rReleased=false;   // only the aim phase consumes the release
  updateParts();
}
function g1Draw(){
  const sh=(G1.shake*((frame%2)?1:-1))|0;
  vgrad(0,0,W,H,C.skyTop,C.skyBot);
  ctx.fillStyle=C.grass1; ctx.fillRect(0,150,W,H-150);
  for(let i=0;i<8;i++){ ctx.fillStyle=i%2?C.grass2:C.grass3; ctx.fillRect(0,160+i*20,W,10); }
  ctx.save(); ctx.translate(sh,0);
  drawBackstop(NET1); drawGoalFrame(NET1); drawMesh(NET1);
  const gk=G1.gk, fh=g1FiveHole(gk);
  // coverage = his whole vertical column (top to bottom of the net)
  const bx=clamp(gk.x-gk.bw/2-gk.reach,NET1.x,NET1.x+NET1.w);
  const bw2=clamp(gk.bw+gk.reach*2, 0, NET1.x+NET1.w-bx);
  ctx.fillStyle='rgba(8,8,12,0.42)'; ctx.fillRect(bx, NET1.y, bw2, NET1.h);
  drawGoalie(gk.x, NET1.y+NET1.h, gk.bw, gk.bh, gk.lunge, fh, G1.fhOpen);
  if(G1.phase==='aim'){
    const inNet=G1.aimX>NET1.x&&G1.aimX<NET1.x+NET1.w&&G1.aimY>NET1.y&&G1.aimY<NET1.y+NET1.h;
    const open=inNet&&!g1Covered(G1.aimX,G1.aimY,gk);
    const col=!inNet?C.grey:(open?C.green:C.red), blink=frame%8<5;
    ctx.strokeStyle=blink?col:C.white; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(G1.aimX,G1.aimY,11,0,7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(G1.aimX-15,G1.aimY); ctx.lineTo(G1.aimX+15,G1.aimY); ctx.moveTo(G1.aimX,G1.aimY-15); ctx.lineTo(G1.aimX,G1.aimY+15); ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(G1.shooterX,G1.shooterY-44); ctx.lineTo(G1.aimX,G1.aimY); ctx.stroke(); ctx.setLineDash([]);
  }
  if(G1.ball&&!G1.ball.dead) drawBall(G1.ball.x,G1.ball.y,4);
  drawParts();
  drawShooter(G1.shooterX,G1.shooterY,G1.phase==='fly'&&frame%4<2);
  ctx.restore();
  // twin joysticks
  const la=sL.id!==null||keys.moveL||keys.moveR;
  const ra=sR.id!==null||keys.aimL||keys.aimR||keys.aimU||keys.aimD;
  drawJoy(LJOY,sL,'MOVE',la,C.blue);
  drawJoy(RJOY,sR,'AIM / RELEASE',ra,C.green);
  if(sR.id!==null && G1.phase==='aim'){ textCS('RELEASE TO SHOOT',H-150,1,frame%10<6?C.green:C.cream,C.black); }
  // HUD
  ctx.fillStyle=C.panel; ctx.fillRect(0,0,W,26); ctx.fillStyle=C.gold; ctx.fillRect(0,24,W,2);
  drawText('SCORE',8,4,1,C.grey); drawText(''+G1.score,8,13,2,C.white);
  drawText('GOALS',W/2-16,4,1,C.grey); drawText(G1.goals+'/10',W/2-16,13,2,C.green);
  drawText('SHOTS',W-58,4,1,C.grey); drawText(''+G1.shots,W-30,13,2,C.yellow);
  if(G1.msgT>0) textCS(G1.msg,250+Math.sin(frame*0.3)*2,3,G1.msgC,C.black);
  if(G1.tut) tutorial('GOALIE','LEFT STICK MOVES YOU','RIGHT STICK AIMS - LIFT TO SHOOT');
}

// ====================== TUTORIAL ======================
function tutorial(title,l1,l2){
  ctx.fillStyle='rgba(0,0,0,0.74)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle=C.panel; ctx.fillRect(20,H/2-86,W-40,172);
  ctx.fillStyle=C.yellow; ctx.fillRect(20,H/2-86,W-40,4); ctx.fillRect(20,H/2+82,W-40,4);
  textCS(title,H/2-66,3,C.yellow,C.black);
  textCS('HOW TO PLAY',H/2-30,1,C.grey,C.black);
  textCS(l1,H/2-6,1,C.cream,C.black); textCS(l2,H/2+12,1,C.cream,C.black);
  if(frame%24<14) textCS('TAP TO BEGIN',H/2+52,2,C.green,C.black);
}

// ====================== GAME OVER ======================
let over={score:0,best:0,nb:false,t:0};
function endGame(score){ over.score=score; over.t=0; over.best=HI.g1; over.nb=false;
  if(score>HI.g1){ over.nb=true; HI.g1=score; over.best=score; saveHi(); spawn(W/2,180,40,[C.yellow,C.green,C.gold,C.white]); }
  state=S.OVER; }
function overUpdate(){ over.t++; updateParts(); let p; while((p=consumeTap())){ if(over.t<=20) break;
  const bw=(W-60)/2;
  if(hit(p,{x:24,y:H-150,w:bw,h:52})){ g1Init(); state=S.G1; return; }
  if(hit(p,{x:36+bw,y:H-150,w:bw,h:52})||p.x<0){ state=S.MENU; return; } } }
function drawOver(){
  vgrad(0,0,W,H,'#101a3a','#04060e');
  textCS('GOALIE',90,2,C.grey,C.black);
  textCS('GAME OVER',120,4,C.red,C.black);
  ctx.fillStyle=C.panel; ctx.fillRect(40,170,W-80,120); ctx.fillStyle=C.gold; ctx.fillRect(40,170,W-80,4);
  textCS('YOUR SCORE',196,1,C.grey,C.black); textCS(''+over.score,214,6,C.yellow,C.black);
  if(over.nb&&frame%16<10) textCS('NEW BEST!',272,2,C.green,C.black); else textCS('BEST  '+over.best,274,1,C.cream,C.black);
  drawParts();
  const bw=(W-60)/2;
  ctx.fillStyle=C.panelHi; ctx.fillRect(24,H-150,bw,52); ctx.fillStyle=C.green; ctx.fillRect(24,H-150,bw,3);
  drawText('PLAY',24+bw/2-textW('PLAY',2)/2,H-138,2,C.white); drawText('AGAIN',24+bw/2-textW('AGAIN',1)/2,H-118,1,C.green);
  ctx.fillStyle=C.panelHi; ctx.fillRect(36+bw,H-150,bw,52); ctx.fillStyle=C.yellow; ctx.fillRect(36+bw,H-150,bw,3);
  drawText('MENU',36+bw+bw/2-textW('MENU',2)/2,H-130,2,C.white);
  if(over.t>20&&frame%20<12) textCS('TAP A BUTTON',H-44,1,C.cream,C.black);
}

// ====================== MAIN LOOP (crash-safe) ======================
function frameStep(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  if(state===S.MENU){ menuUpdate(); drawMenu(); }
  else if(state===S.HELP){ helpUpdate(); drawHelp(); }
  else if(state===S.G1){ g1Update(); g1Draw(); }
  else if(state===S.OVER){ overUpdate(); drawOver(); }
  ctx.globalAlpha=0.05; ctx.fillStyle='#000'; for(let y=0;y<H;y+=3) ctx.fillRect(0,y,W,1); ctx.globalAlpha=1;
}
let lastErr='';
function loop(){
  frame++;
  try{ frameStep(); }
  catch(e){
    // never freeze on a blank screen — show the error and let the user tap back to menu
    lastErr=(''+(e&&e.message||e)).slice(0,40);
    ctx.fillStyle='#101626'; ctx.fillRect(0,0,W,H);
    textCS('OOPS',120,4,C.red,C.black);
    textC('SOMETHING GLITCHED',170,1,C.cream);
    textC(lastErr||'UNKNOWN',192,1,C.grey);
    textC('TAP TO RETURN TO MENU',240,1,C.yellow);
    if(consumeTap()){ state=S.MENU; menuSel=0; }
  }
  pressQueue.length=0;
  requestAnimationFrame(loop);
}
loop();

})();
